---
- name: Install the right Apache package depending on OS family
  hosts: all
  become: true
  vars:
    webserver_pkg:
      RedHat: httpd
      Debian: apache2
  tasks:
    - name: Fail on unsupported OS family
      ansible.builtin.fail:
        msg: "Unsupported OS family: {{ ansible_facts['os_family'] }}"
      when: ansible_facts['os_family'] not in webserver_pkg

    - name: Install webserver package
      ansible.builtin.package:
        name: "{{ webserver_pkg[ansible_facts['os_family']] }}"
        state: present

    - name: Ensure webserver is running and enabled
      ansible.builtin.service:
        name: "{{ webserver_pkg[ansible_facts['os_family']] }}"
        state: started
        enabled: true
