---
- name: Ensure SSH security
  hosts: all
  become: true
  tasks:
    - name: Disable root login in sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart sshd

    - name: Ensure sshd is running and enabled at boot
      ansible.builtin.service:
        name: sshd
        state: started
        enabled: true

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
