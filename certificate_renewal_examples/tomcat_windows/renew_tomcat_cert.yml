---
# Single-shot wrapper for the renewal flow:
#   1. cert_check.yml — per-host pre-flight; sets cert_renewal_needed.
#   2. cert_renew.yml — runs the LE + ship + restart roles, skipping any host
#      where cert_renewal_needed is false (set by step 1).
#
# Use this for local / ad-hoc runs. In AAP workflows, run the two playbooks
# as separate job templates with a ServiceNow change-request creation step
# wedged between them — see DEMO.md and README.md for the workflow pattern.
#
# Required vars (extra-vars, inventory, or AAP credential injectors):
#   cloudflare_zone, cloudflare_api_token, ansible_password
#
# Optional vars:
#   cert_remaining_days (default 30) — renew if live cert has fewer days left.
#   acme_env            (default staging) — set to `production` for trusted certs.

- import_playbook: cert_check.yml
- import_playbook: cert_renew.yml
