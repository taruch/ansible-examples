---
- name: Configuration-Based Certificate Discovery
  hosts: all
  gather_facts: true
  vars:
    report_dir: "./reports"
    report_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"

    # Package-to-configuration mapping
    package_configs:
      httpd:
        name: "Apache HTTP Server"
        config_files:
          - /etc/httpd/conf/httpd.conf
          - /etc/httpd/conf.d/ssl.conf
          - /etc/httpd/conf.d/*.conf
        cert_directives:
          - regex: '^\s*SSLCertificateFile\s+(.+)$'
            type: certificate
          - regex: '^\s*SSLCertificateKeyFile\s+(.+)$'
            type: key
          - regex: '^\s*SSLCACertificateFile\s+(.+)$'
            type: ca_cert
          - regex: '^\s*SSLCertificateChainFile\s+(.+)$'
            type: chain

      apache2:
        name: "Apache HTTP Server"
        config_files:
          - /etc/apache2/apache2.conf
          - /etc/apache2/sites-enabled/*.conf
          - /etc/apache2/conf-enabled/*.conf
        cert_directives:
          - regex: '^\s*SSLCertificateFile\s+(.+)$'
            type: certificate
          - regex: '^\s*SSLCertificateKeyFile\s+(.+)$'
            type: key
          - regex: '^\s*SSLCACertificateFile\s+(.+)$'
            type: ca_cert

      nginx:
        name: "Nginx"
        config_files:
          - /etc/nginx/nginx.conf
          - /etc/nginx/sites-enabled/*
          - /etc/nginx/conf.d/*.conf
        cert_directives:
          - regex: '^\s*ssl_certificate\s+(.+);$'
            type: certificate
          - regex: '^\s*ssl_certificate_key\s+(.+);$'
            type: key
          - regex: '^\s*ssl_trusted_certificate\s+(.+);$'
            type: ca_cert

      tomcat:
        name: "Apache Tomcat"
        config_files:
          - /etc/tomcat/server.xml
          - /opt/tomcat/conf/server.xml
          - /usr/share/tomcat/conf/server.xml
        cert_directives:
          - regex: 'keystoreFile="([^"]+)"'
            type: keystore
          - regex: 'truststoreFile="([^"]+)"'
            type: truststore
          - regex: 'certificateFile="([^"]+)"'
            type: certificate
          - regex: 'certificateKeyFile="([^"]+)"'
            type: key

      tomcat9:
        name: "Apache Tomcat 9"
        config_files:
          - /etc/tomcat9/server.xml
          - /opt/tomcat9/conf/server.xml
        cert_directives:
          - regex: 'keystoreFile="([^"]+)"'
            type: keystore
          - regex: 'certificateFile="([^"]+)"'
            type: certificate

      tomcat10:
        name: "Apache Tomcat 10"
        config_files:
          - /etc/tomcat10/server.xml
          - /opt/tomcat10/conf/server.xml
        cert_directives:
          - regex: 'keystoreFile="([^"]+)"'
            type: keystore
          - regex: 'certificateFile="([^"]+)"'
            type: certificate

      haproxy:
        name: "HAProxy"
        config_files:
          - /etc/haproxy/haproxy.cfg
        cert_directives:
          - regex: 'bind\s+[^:]+:\d+\s+.*?crt\s+(\S+)'
            type: certificate
          - regex: 'ca-file\s+(\S+)'
            type: ca_cert

      postfix:
        name: "Postfix"
        config_files:
          - /etc/postfix/main.cf
        cert_directives:
          - regex: '^smtpd_tls_cert_file\s*=\s*(.+)$'
            type: certificate
          - regex: '^smtpd_tls_key_file\s*=\s*(.+)$'
            type: key
          - regex: '^smtpd_tls_CAfile\s*=\s*(.+)$'
            type: ca_cert

      dovecot:
        name: "Dovecot"
        config_files:
          - /etc/dovecot/dovecot.conf
          - /etc/dovecot/conf.d/10-ssl.conf
        cert_directives:
          - regex: '^ssl_cert\s*=\s*<(.+)$'
            type: certificate
          - regex: '^ssl_key\s*=\s*<(.+)$'
            type: key

      postgresql:
        name: "PostgreSQL"
        config_files:
          - /var/lib/postgresql/*/data/postgresql.conf
          - /etc/postgresql/*/main/postgresql.conf
        cert_directives:
          - regex: "^ssl_cert_file\\s*=\\s*'([^']+)'"
            type: certificate
          - regex: "^ssl_key_file\\s*=\\s*'([^']+)'"
            type: key
          - regex: "^ssl_ca_file\\s*=\\s*'([^']+)'"
            type: ca_cert

      mysql:
        name: "MySQL"
        config_files:
          - /etc/my.cnf
          - /etc/mysql/my.cnf
          - /etc/mysql/mysql.conf.d/*.cnf
        cert_directives:
          - regex: '^ssl-cert\s*=\s*(.+)$'
            type: certificate
          - regex: '^ssl-key\s*=\s*(.+)$'
            type: key
          - regex: '^ssl-ca\s*=\s*(.+)$'
            type: ca_cert

      mariadb:
        name: "MariaDB"
        config_files:
          - /etc/my.cnf
          - /etc/mysql/mariadb.conf.d/*.cnf
        cert_directives:
          - regex: '^ssl-cert\s*=\s*(.+)$'
            type: certificate
          - regex: '^ssl-key\s*=\s*(.+)$'
            type: key

  tasks:
    - name: Create local report directory
      delegate_to: localhost
      run_once: true
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        mode: '0755'

    - name: Gather package facts (Linux)
      ansible.builtin.package_facts:
        manager: auto
      when: ansible_os_family != "Windows"

    - name: Identify installed packages with certificate configs
      ansible.builtin.set_fact:
        detected_packages: "{{ ansible_facts.packages.keys() | list |
          intersect(package_configs.keys() | list) }}"
      when: ansible_os_family != "Windows"

    - name: Display detected packages
      ansible.builtin.debug:
        msg: "Detected packages with SSL/TLS configurations: {{ detected_packages | join(', ') }}"
      when:
        - ansible_os_family != "Windows"
        - detected_packages | length > 0

    - name: Parse configuration files for each detected package
      when:
        - ansible_os_family != "Windows"
        - detected_packages | length > 0
      block:
        - name: Find configuration files for detected packages
          ansible.builtin.find:
            paths: "{{ item.value.config_files | map('dirname') | unique | list }}"
            patterns: "{{ item.value.config_files | map('basename') | list }}"
            file_type: file
          loop: "{{ detected_packages |
            map('extract', package_configs) |
            dict2items }}"
          register: config_files_found
          ignore_errors: true

        - name: Read configuration file contents
          ansible.builtin.slurp:
            src: "{{ item.1.path }}"
          loop: "{{ config_files_found.results |
            subelements('files', skip_missing=True) }}"
          register: config_contents
          ignore_errors: true

        - name: Extract certificate paths from configurations
          ansible.builtin.set_fact:
            extracted_cert_paths: >-
              {{
                extracted_cert_paths | default([]) +
                [{
                  'package': item.item.0.item.key,
                  'package_name': item.item.0.item.value.name,
                  'config_file': item.item.1.path,
                  'cert_paths': _extract_cert_paths(
                    item.content | b64decode,
                    item.item.0.item.value.cert_directives
                  )
                }]
              }}
          loop: "{{ config_contents.results }}"
          when: config_contents.results is defined
          vars:
            _extract_cert_paths: "{{ lookup('template', 'extract_paths.j2') }}"

    - name: Flatten discovered certificate paths
      ansible.builtin.set_fact:
        all_cert_paths: "{{ extracted_cert_paths |
          default([]) |
          map(attribute='cert_paths') |
          flatten |
          unique }}"

    - name: Check if certificate files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ all_cert_paths | default([]) }}"
      register: cert_files_stat
      when: all_cert_paths is defined and all_cert_paths | length > 0

    - name: Filter to existing certificate files
      ansible.builtin.set_fact:
        existing_certs: "{{ cert_files_stat.results |
          selectattr('stat.exists', 'equalto', true) |
          map(attribute='item') |
          list }}"
      when: cert_files_stat.results is defined

    - name: Parse certificate details for existing files
      ansible.builtin.shell: |
        set -o pipefail
        if [[ "{{ item }}" =~ \.(jks|keystore|p12|pfx)$ ]]; then
          echo "TYPE=keystore"
          echo "PATH={{ item }}"
          if command -v keytool >/dev/null 2>&1; then
            keytool -list -v -keystore "{{ item }}" -storepass changeit 2>/dev/null | \
              grep -A2 "Alias name:" | head -20 || echo "PROTECTED=true"
          else
            echo "KEYTOOL_UNAVAILABLE=true"
          fi
        elif [[ "{{ item }}" =~ \.key$ ]] || [[ "{{ item }}" =~ \.pem$ ]] && grep -q "PRIVATE KEY" "{{ item }}" 2>/dev/null; then
          echo "TYPE=private_key"
          echo "PATH={{ item }}"
        else
          echo "TYPE=certificate"
          echo "PATH={{ item }}"
          echo "SUBJECT=$(openssl x509 -in "{{ item }}" -noout -subject 2>/dev/null || echo 'parse_error')"
          echo "ISSUER=$(openssl x509 -in "{{ item }}" -noout -issuer 2>/dev/null || echo 'parse_error')"
          echo "EXPIRY=$(openssl x509 -in "{{ item }}" -noout -enddate 2>/dev/null || echo 'parse_error')"
          echo "SERIAL=$(openssl x509 -in "{{ item }}" -noout -serial 2>/dev/null || echo 'parse_error')"
        fi
      args:
        executable: /bin/bash
      loop: "{{ existing_certs | default([]) }}"
      register: cert_details
      changed_when: false
      when:
        - ansible_os_family != "Windows"
        - existing_certs is defined
        - existing_certs | length > 0

    - name: Build structured certificate inventory
      ansible.builtin.set_fact:
        cert_inventory:
          hostname: "{{ ansible_hostname }}"
          fqdn: "{{ ansible_fqdn }}"
          ip_address: "{{ ansible_default_ipv4.address | default('unknown') }}"
          os_family: "{{ ansible_os_family }}"
          os_distribution: "{{ ansible_distribution }}"
          os_version: "{{ ansible_distribution_version }}"
          scan_timestamp: "{{ ansible_date_time.iso8601 }}"
          scan_method: "configuration_parsing"
          detected_packages: "{{ detected_packages | default([]) }}"
          packages_details: "{{ extracted_cert_paths | default([]) }}"
          total_certificates: "{{ existing_certs | default([]) | length }}"
          certificates: "{{ cert_details.results | default([]) |
            map('parse_cert_output') | list }}"
      when: ansible_os_family != "Windows"

    - name: Handle IIS certificate discovery (Windows)
      when: ansible_os_family == "Windows"
      block:
        - name: Check if IIS is installed
          ansible.windows.win_powershell:
            script: |
              $iis = Get-WindowsFeature -Name Web-Server
              $Ansible.Result = $iis.Installed
          register: iis_installed
          changed_when: false

        - name: Get IIS bindings with certificates
          ansible.windows.win_powershell:
            script: |
              Import-Module WebAdministration -ErrorAction SilentlyContinue
              $bindings = Get-WebBinding | Where-Object {
                  $_.protocol -eq 'https' -and $_.certificateHash
              }
              $certs = @()
              foreach ($binding in $bindings) {
                  $certHash = $binding.certificateHash
                  $storeName = if ($binding.certificateStoreName) { $binding.certificateStoreName } else { 'My' }
                  try {
                      $cert = Get-ChildItem -Path "Cert:\LocalMachine\$storeName" |
                              Where-Object { $_.Thumbprint -eq $certHash }
                      if ($cert) {
                          $certs += [PSCustomObject]@{
                              SiteName = $binding.ItemXPath -replace '.*name=''([^'']+)''.*', '$1'
                              BindingInformation = $binding.bindingInformation
                              Protocol = $binding.protocol
                              CertificateHash = $certHash
                              CertificateStore = "Cert:\LocalMachine\$storeName"
                              Subject = $cert.Subject
                              Issuer = $cert.Issuer
                              Thumbprint = $cert.Thumbprint
                              NotBefore = $cert.NotBefore.ToString('yyyy-MM-dd HH:mm:ss')
                              NotAfter = $cert.NotAfter.ToString('yyyy-MM-dd HH:mm:ss')
                              HasPrivateKey = $cert.HasPrivateKey
                              DnsNameList = ($cert.DnsNameList.Unicode -join ',')
                          }
                      }
                  } catch {
                      Write-Host "Error processing certificate: $_"
                  }
              }
              $Ansible.Result = $certs
          register: iis_certificates
          when: iis_installed.result | default(false)
          changed_when: false

        - name: Build Windows certificate inventory
          ansible.builtin.set_fact:
            cert_inventory:
              hostname: "{{ ansible_hostname }}"
              fqdn: "{{ ansible_fqdn }}"
              ip_address: "{{ ansible_ip_addresses[0] | default('unknown') }}"
              os_family: "{{ ansible_os_family }}"
              os_distribution: "Windows"
              os_version: "{{ ansible_distribution_version | default('unknown') }}"
              scan_timestamp: "{{ ansible_date_time.iso8601 }}"
              scan_method: "iis_configuration_parsing"
              iis_installed: "{{ iis_installed.result | default(false) }}"
              total_certificates: "{{ iis_certificates.result | default([]) | length }}"
              iis_bindings: "{{ iis_certificates.result | default([]) }}"

    - name: Save individual host report (JSON)
      delegate_to: localhost
      ansible.builtin.copy:
        content: "{{ cert_inventory | to_nice_json }}"
        dest: "{{ report_dir }}/{{ inventory_hostname }}_config_based_{{ report_timestamp }}.json"
        mode: '0644'

    - name: Display discovery summary
      ansible.builtin.debug:
        msg:
          - "=== Configuration-Based Certificate Discovery Summary ==="
          - "Host: {{ inventory_hostname }}"
          - "Packages Scanned: {{ cert_inventory.detected_packages | default([]) | join(', ') | default('None') }}"
          - "Certificates Found: {{ cert_inventory.total_certificates }}"
          - "Discovery Method: {{ cert_inventory.scan_method }}"
          - "Report: {{ report_dir }}/{{ inventory_hostname }}_config_based_{{ report_timestamp }}.json"
