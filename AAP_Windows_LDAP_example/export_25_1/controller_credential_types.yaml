---
controller_credential_types:
  - name: Dynatrace
    description: !unsafe
    kind: cloud
    inputs:
      fields:
        - id: dynatrace_url
          type: string
          label: Dynatrace Host
        - id: dynatrace_api_key
          type: string
          label: Dynatrace API Key
          secret: true
      required:
        - dynatrace_url
        - dynatrace_api_key
    injectors:
      extra_vars:
        dynatrace_url: !unsafe '{{ dynatrace_url }}'
        dynatrace_api_key: !unsafe '{{ dynatrace_api_key }}'
  - name: Insights Collection
    description: !unsafe
    kind: cloud
    inputs:
      fields:
        - id: insights_user
          type: string
          label: Insights User
        - id: insights_password
          type: string
          label: Insights Password
          secret: true
    injectors:
      env:
        INSIGHTS_USER: !unsafe '{{ insights_user}}'
        INSIGHTS_PASSWORD: !unsafe '{{ insights_password}}'
  - name: ServiceNow
    description: !unsafe
    kind: cloud
    inputs:
      fields:
        - id: SN_USERNAME
          type: string
          label: Username
        - id: SN_PASSWORD
          type: string
          label: Password
          secret: true
        - id: SN_HOST
          type: string
          label: Snow Host
      required:
        - SN_USERNAME
        - SN_PASSWORD
        - SN_HOST
    injectors:
      env:
        SN_HOST: !unsafe '{{ SN_HOST }}'
        SN_PASSWORD: !unsafe '{{ SN_PASSWORD }}'
        SN_USERNAME: !unsafe '{{ SN_USERNAME }}'
      extra_vars:
        SN_HOST: !unsafe '{{ SN_HOST }}'
        SN_PASSWORD: !unsafe '{{ SN_PASSWORD }}'
        SN_USERNAME: !unsafe '{{ SN_USERNAME }}'
  - name: ServiceNow Token Credential
    description: !unsafe
    kind: cloud
    inputs:
      fields:
        - id: SN_HOST
          type: string
          label: Snow Host
        - id: SN_API_KEY
          type: string
          label: SNOW Token
          secret: true
      required:
        - SN_HOST
        - SN_API_KEY
    injectors:
      env:
        SN_HOST: !unsafe '{{ SN_HOST }}'
        SN_API_KEY: !unsafe '{{ SN_API_KEY }}'
      extra_vars:
        SN_HOST: !unsafe '{{ SN_HOST }}'
        SN_API_KEY: !unsafe '{{ SN_API_KEY }}'
  - name: VMWare Demo Credential
    description: !unsafe
    kind: cloud
    inputs:
      fields:
        - id: host
          type: string
          label: VCenter Host
          help_text: Enter the hostname or IP address that corresponds to your VMware vCenter.
        - id: username
          type: string
          label: Username
        - id: password
          type: string
          label: Password
          secret: true
      required:
        - host
        - username
        - password
    injectors:
      env:
        VMWARE_HOST: !unsafe '{{ host }}'
        VMWARE_USER: !unsafe '{{ username }}'
        VMWARE_PASSWORD: !unsafe '{{ password }}'
        vcenter_hostname: !unsafe '{{ host }}'
        vcenter_password: !unsafe '{{ password }}'
        vcenter_username: !unsafe '{{ username }}'
      extra_vars:
        vcenter_hostname: !unsafe '{{ host }}'
        vcenter_password: !unsafe '{{ password }}'
        vcenter_username: !unsafe '{{ username }}'
...
