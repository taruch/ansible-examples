---
- name: Get things from ServiceNow
  hosts: localhost

  tasks:

  # Provide credentials via vault / extra-vars / AAP credential, e.g.:
  #   ansible-vault encrypt_string 'YOUR_SN_PASSWORD' --name vault_servicenow_password
  #   ansible-playbook servicenow_example.yml -e servicenow_host=https://YOURINSTANCE.service-now.com
  - name: Query ServiceNow for ci record
    servicenow.servicenow.snow_record_find:
      username: "{{ servicenow_username | default('admin') }}"
      password: "{{ vault_servicenow_password }}"
      host: "{{ servicenow_host }}"
      table: cmdb_ci_computer
      query:
        sn_sys_class_name: "Server"
      return_fields:
        - os
    register: servicenow_out
    #- number
    #- sys_created_on
    #- sys_updated_on
    #- u_template
    #- active
    #- type
    #- u_change_stage
    #- sys_created_by
    #- description
    #- short_description

  - name: print output
    ansible.builtin.debug:
      #msg: "{{ servicenow_out }}"
      msg: "{{ servicenow_out }}"
