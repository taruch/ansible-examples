---
- name: Import file tree into controller
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    controller_username: "{{ vault_controller_username | default(lookup('env', 'CONTROLLER_USERNAME')) }}"
    controller_password: "{{ vault_controller_password | default(lookup('env', 'CONTROLLER_PASSWORD')) }}"
    controller_hostname: "{{ vault_controller_hostname | default(lookup('env', 'CONTROLLER_HOST')) }}"
    controller_validate_certs: "{{ vault_controller_validate_certs | default(lookup('env', 'CONTROLLER_VERIFY_SSL')) }}"
    aap_username: "{{ vault_aap_username | default(lookup('env', 'CONTROLLER_USERNAME')) }}"
    aap_password: "{{ vault_aap_password | default(lookup('env', 'CONTROLLER_PASSWORD')) }}"
    aap_hostname: "{{ vault_aap_hostname | default(lookup('env', 'CONTROLLER_HOST')) }}"
    aap_validate_certs: "{{ vault_aap_validate_certs | default(lookup('env', 'CONTROLLER_VERIFY_SSL')) }}"
    ansible_no_log: false
    import_path: "./export_24_260105-01"
  
  # You can set 'file_path' to have a specific file read in and processed for troubleshooting.  Typically you would do this by adding it as an extra var when running the playbook.

  tasks:
    # - name: Import vaulted variables
    #   ansible.builtin.include_vars: "{{ import_path }}/vaulted_variables.yml"

    - name: "Setup authentication (block)"
      when: controller_oauthtoken is not defined
      block:
        - name: "Get the Authentication Token for the future requests"
          ansible.builtin.uri:
            url: "https://{{ controller_hostname }}/api/gateway/v1/tokens/"
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            method: POST
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            status_code: 201
          register: authtoken_res

        - name: "Set the oauth token to be used since now"
          ansible.builtin.set_fact:
            controller_oauthtoken: "{{ authtoken_res.json.token }}"
            aap_token: "{{ authtoken_res.json.token }}"
            controller_oauthtoken_url: "{{ authtoken_res.json.url }}"

    - name: Include configuration file
      when: file_path is defined
      ansible.builtin.include_vars: "{{ file_path }}"

    - name: Debug file_path variables
      ansible.builtin.debug:
        msg: 
          - "Variable Type: {{ controller_workflows[0].simplified_workflow_nodes | type_debug }}"
          - "List Length: {{ controller_workflows[0].simplified_workflow_nodes | length }}"
          - "First Item Keys: {{ (controller_workflows[0].simplified_workflow_nodes | first).keys() | list if controller_workflows | length > 0 else 'EMPTY' }}"

    - name: "Extract all required Job Template names (Native Filter Method)"
      ansible.builtin.set_fact:
        required_templates: >
          {{ 
            controller_workflows[0].simplified_workflow_nodes
            | selectattr('unified_job_template', 'defined') 
            | map(attribute='unified_job_template') 
            | unique 
          }}

    - name: "Check existence of each required Job Template"
      ansible.builtin.uri:
        url: "https://{{ controller_hostname }}/api/controller/v2/unified_job_templates/?name={{ item | urlencode }}"
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        method: GET
        force_basic_auth: yes
        validate_certs: "{{ controller_validate_certs }}"
        return_content: yes
        status_code: 200
      register: template_lookup
      loop: "{{ required_templates }}"
      # Don't fail yet, just register the results
      ignore_errors: true 

    - name: "FAIL if any required Job Template is missing"
      fail:
        msg: >
          ERROR: The Job Template '{{ item.item }}' is missing from the Controller!
          The Workflow cannot be created because this node does not exist yet.
          Please create this Job Template first.
      when: item.json.count == 0
      loop: "{{ template_lookup.results }}"
      loop_control:
        label: "{{ item.item }}"

    # - name: Create a workflow job template with workflow nodes in template
    #   ansible.controller.workflow_job_template: "{{ controller_workflows[0] }}"

    - name: Dispatch the configuration to AAP 2.5
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        controller_configuration_filetree_create_secure_logging: false
        controller_configuration_filetree_read_secure_logging: false
        aap_configuration_secure_logging: false
        aap_configuration_collect_logs: true
        cas_secure_logging: false
        controller_configuration_job_templates_secure_logging: false

    - name: "Delete the Authentication Token used"
      ansible.builtin.uri:
        url: "https://{{ controller_hostname }}{{ controller_oauthtoken_url }}"
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        method: DELETE
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        status_code: 204
      when: controller_oauthtoken_url is defined

...
