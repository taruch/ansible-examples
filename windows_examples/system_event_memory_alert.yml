---
# Report on high memory usage upon receiving an alert
# Use case: Alert system detects high memory and triggers this playbook via AAP webhook
# Returns detailed memory metrics, top memory consumers, and page file usage

- name: Windows High Memory Investigation Report
  hosts: "{{ _hosts | default('all') }}"
  gather_facts: true

  vars:
    # Alert threshold percentage (can be passed as extra var)
    memory_threshold: 85
    # Number of top memory processes to report
    top_process_count: 10
    # Report output directory on the controller
    report_dir: "/tmp/windows_reports"

  tasks:
    - name: Gather Windows memory facts
      ansible.windows.setup:
        gather_subset:
          - memory
          - date_time

    - name: Get detailed memory usage
      ansible.windows.win_powershell:
        script: |
          $os = Get-CimInstance Win32_OperatingSystem
          $totalMemoryGB = [math]::Round($os.TotalVisibleMemorySize / 1MB, 2)
          $freeMemoryGB = [math]::Round($os.FreePhysicalMemory / 1MB, 2)
          $usedMemoryGB = $totalMemoryGB - $freeMemoryGB
          $percentUsed = [math]::Round(($usedMemoryGB / $totalMemoryGB) * 100, 2)

          [PSCustomObject]@{
              TotalMemoryGB = $totalMemoryGB
              UsedMemoryGB = $usedMemoryGB
              FreeMemoryGB = $freeMemoryGB
              PercentUsed = $percentUsed
              Timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          }
      register: memory_usage

    - name: Get top memory consuming processes
      ansible.windows.win_powershell:
        script: |
          Get-Process |
            Where-Object { $_.WorkingSet64 -gt 0 } |
            Sort-Object WorkingSet64 -Descending |
            Select-Object -First {{ top_process_count }} Name,
              @{Name='Memory(MB)';Expression={[math]::Round($_.WorkingSet64 / 1MB, 2)}},
              @{Name='PrivateMemory(MB)';Expression={[math]::Round($_.PrivateMemorySize64 / 1MB, 2)}},
              @{Name='VirtualMemory(MB)';Expression={[math]::Round($_.VirtualMemorySize64 / 1MB, 2)}},
              Id,
              @{Name='Threads';Expression={$_.Threads.Count}},
              StartTime
      register: top_processes

    - name: Get page file usage
      ansible.windows.win_powershell:
        script: |
          $pageFiles = Get-CimInstance Win32_PageFileUsage
          $pageFiles | Select-Object Name,
            @{Name='AllocatedMB';Expression={$_.AllocatedBaseSize}},
            @{Name='CurrentUsageMB';Expression={$_.CurrentUsage}},
            @{Name='PeakUsageMB';Expression={$_.PeakUsage}},
            @{Name='PercentUsed';Expression={
              if ($_.AllocatedBaseSize -gt 0) {
                [math]::Round(($_.CurrentUsage / $_.AllocatedBaseSize) * 100, 2)
              } else { 0 }
            }}
      register: page_file_info

    - name: Get memory performance counters
      ansible.windows.win_powershell:
        script: |
          $counters = @(
              '\Memory\Available MBytes',
              '\Memory\Committed Bytes',
              '\Memory\% Committed Bytes In Use',
              '\Memory\Cache Bytes',
              '\Memory\Pool Paged Bytes',
              '\Memory\Pool Nonpaged Bytes',
              '\Memory\Page Faults/sec',
              '\Paging File(_Total)\% Usage'
          )

          $samples = Get-Counter -Counter $counters -ErrorAction SilentlyContinue
          $results = @{}

          foreach ($sample in $samples.CounterSamples) {
              $counterName = ($sample.Path -split '\\')[-1]
              $results[$counterName] = [math]::Round($sample.CookedValue, 2)
          }
          $results
      register: memory_counters

    - name: Check for memory-intensive services
      ansible.windows.win_powershell:
        script: |
          $services = Get-CimInstance Win32_Service | Where-Object { $_.State -eq 'Running' }
          $serviceMemory = @()

          foreach ($service in $services) {
              try {
                  $process = Get-Process -Id $service.ProcessId -ErrorAction SilentlyContinue
                  if ($process -and $process.WorkingSet64 -gt 50MB) {
                      $serviceMemory += [PSCustomObject]@{
                          ServiceName = $service.Name
                          DisplayName = $service.DisplayName
                          MemoryMB = [math]::Round($process.WorkingSet64 / 1MB, 2)
                          ProcessId = $service.ProcessId
                      }
                  }
              } catch {}
          }

          $serviceMemory | Sort-Object MemoryMB -Descending | Select-Object -First 10
      register: service_memory

    - name: Get memory pools information
      ansible.windows.win_powershell:
        script: |
          $computer = Get-CimInstance Win32_ComputerSystem
          [PSCustomObject]@{
              TotalPhysicalMemoryGB = [math]::Round($computer.TotalPhysicalMemory / 1GB, 2)
              Model = $computer.Model
              Manufacturer = $computer.Manufacturer
              NumberOfProcessors = $computer.NumberOfProcessors
              NumberOfLogicalProcessors = $computer.NumberOfLogicalProcessors
          }
      register: system_info

    - name: Display memory alert summary
      ansible.builtin.debug:
        msg:
          - "=== HIGH MEMORY ALERT INVESTIGATION ==="
          - "Host: {{ inventory_hostname }}"
          - "Alert Time: {{ memory_usage.output[0].Timestamp }}"
          - "Total Memory: {{ memory_usage.output[0].TotalMemoryGB }} GB"
          - "Used Memory: {{ memory_usage.output[0].UsedMemoryGB }} GB"
          - "Free Memory: {{ memory_usage.output[0].FreeMemoryGB }} GB"
          - "Memory Usage: {{ memory_usage.output[0].PercentUsed }}%"
          - "Threshold: {{ memory_threshold }}%"
          - "=== SYSTEM INFORMATION ==="
          - "{{ system_info.output[0] }}"
          - "=== MEMORY PERFORMANCE COUNTERS ==="
          - "{{ memory_counters.output[0] }}"
          - "=== PAGE FILE USAGE ==="
          - "{{ page_file_info.output }}"
          - "=== TOP {{ top_process_count }} MEMORY PROCESSES ==="
          - "{{ top_processes.output }}"
          - "=== MEMORY-INTENSIVE SERVICES ==="
          - "{{ service_memory.output }}"

    - name: Create report directory on controller
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Generate detailed JSON report
      ansible.builtin.copy:
        content: |
          {
            "alert_type": "high_memory",
            "host": "{{ inventory_hostname }}",
            "timestamp": "{{ memory_usage.output[0].Timestamp }}",
            "memory_metrics": {
              "total_memory_gb": {{ memory_usage.output[0].TotalMemoryGB }},
              "used_memory_gb": {{ memory_usage.output[0].UsedMemoryGB }},
              "free_memory_gb": {{ memory_usage.output[0].FreeMemoryGB }},
              "percent_used": {{ memory_usage.output[0].PercentUsed }},
              "threshold_percent": {{ memory_threshold }},
              "performance_counters": {{ memory_counters.output[0] | to_json }}
            },
            "system_info": {{ system_info.output[0] | to_json }},
            "page_file": {{ page_file_info.output | to_json }},
            "top_processes": {{ top_processes.output | to_json }},
            "memory_intensive_services": {{ service_memory.output | to_json }}
          }
        dest: "{{ report_dir }}/memory_alert_{{ inventory_hostname }}_{{ ansible_date_time.epoch }}.json"
      delegate_to: localhost

    - name: Alert if memory exceeds threshold
      ansible.builtin.assert:
        that:
          - memory_usage.output[0].PercentUsed | float < memory_threshold | float
        fail_msg: "CRITICAL: Memory usage ({{ memory_usage.output[0].PercentUsed }}%) exceeds threshold ({{ memory_threshold }}%)"
        success_msg: "Memory usage ({{ memory_usage.output[0].PercentUsed }}%) is within acceptable range"
      ignore_errors: true
      register: memory_check

    - name: Set stats for AAP dashboard
      ansible.builtin.set_stats:
        data:
          memory_percent_used: "{{ memory_usage.output[0].PercentUsed }}"
          memory_threshold: "{{ memory_threshold }}"
          memory_used_gb: "{{ memory_usage.output[0].UsedMemoryGB }}"
          memory_free_gb: "{{ memory_usage.output[0].FreeMemoryGB }}"
          top_process: "{{ top_processes.output[0].Name }}"
          top_process_memory_mb: "{{ top_processes.output[0]['Memory(MB)'] }}"
          alert_severity: "{{ 'CRITICAL' if memory_usage.output[0].PercentUsed | float > memory_threshold | float else 'OK' }}"
