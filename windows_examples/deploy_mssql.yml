---
# SQL Server Installation Playbook
#
# Prerequisites:
# 1. Download SQL Server ISO from Microsoft
#    - Developer Edition: https://go.microsoft.com/fwlink/?linkid=866662
#    - Evaluation: https://www.microsoft.com/en-us/evalcenter/evaluate-sql-server
# 2. Place ISO in Downloads directory on Windows host (C:\Users\Administrator\Downloads\)
# 3. Ensure WinRM is configured and accessible
# 4. Have sa password ready (will be prompted or pass via -e mssql_sa_password=...)
#
# Usage:
#   ansible-playbook deploy_mssql.yml
#   ansible-playbook deploy_mssql.yml -e "_mssql_iso_filename=SQLServer2022-x64-ENU.iso"
#   ansible-playbook deploy_mssql.yml -e "_mssql_iso_source_path=D:\ISOs\SQLServer.iso"
#
- name: Install and configure Microsoft SQL Server on Windows
  hosts: "{{ _hosts | default('windows') }}"
  gather_facts: false

  vars_files:
    - secrets.yml

  vars:
    ansible_connection: winrm
    ansible_winrm_transport: basic
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_port: 5986
    ansible_winrm_scheme: https

    # ISO file should already be in Downloads directory
    # Default assumes user downloaded it to C:\Users\<username>\Downloads\
    # Windows accepts forward slashes in paths
    mssql_iso_filename: "{{ _mssql_iso_filename | default('SQLServer.iso') }}"
    mssql_iso_source_path: "{{ _mssql_iso_source_path | default('C:/Users/Administrator/Downloads/' + mssql_iso_filename) }}"
    mssql_iso_path: "C:/Temp/SQLServer.iso"
    mssql_instance_name: MSSQLSERVER
    mssql_edition: Developer
    mssql_features: SQLENGINE
    mssql_collation: SQL_Latin1_General_CP1_CI_AS
    mssql_tcp_port: 1433
    mssql_max_memory_mb: 4096
    mssql_sysadmin_accounts: "BUILTIN\\Administrators"
    mssql_auth_mode: Mixed
    mssql_data_dir: "C:/SQLData"
    mssql_log_dir: "C:/SQLLogs"
    mssql_temp_dir: "C:/SQLTemp"

  tasks:
    # --- STEP 1: Validate prerequisites ---
    - name: Gather system memory
      ansible.windows.win_shell: |
        (Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1MB
      register: system_memory
      changed_when: false

    - name: Assert minimum memory requirement (2 GB)
      ansible.builtin.assert:
        that: system_memory.stdout | trim | float >= 2048
        fail_msg: "SQL Server requires at least 2 GB RAM. Found {{ system_memory.stdout | trim }} MB."
        success_msg: "Memory check passed ({{ system_memory.stdout | trim }} MB available)."

    - name: Ensure .NET Framework 4.5+ is installed
      ansible.windows.win_feature:
        name: NET-Framework-45-Core
        state: present
      register: dotnet_install

    - name: Check if reboot is required after .NET installation
      ansible.windows.win_powershell:
        script: |
          $rebootPending = $false
          $keys = @(
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending',
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired'
          )

          foreach ($key in $keys) {
            if (Test-Path $key) {
              $rebootPending = $true
              break
            }
          }

          # Check PendingFileRenameOperations
          if (-not $rebootPending) {
            $pendingOps = Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager' -Name PendingFileRenameOperations -ErrorAction SilentlyContinue
            if ($pendingOps) {
              $rebootPending = $true
            }
          }

          # Output only true or false
          if ($rebootPending) {
            Write-Output "true"
          } else {
            Write-Output "false"
          }
      register: reboot_check
      changed_when: false

    - name: Set reboot flag
      ansible.builtin.set_fact:
        needs_reboot: "{{ reboot_check.output[0] | trim | bool }}"

    - name: Reboot Windows if needed before SQL Server installation
      ansible.windows.win_reboot:
        reboot_timeout: 600
        post_reboot_delay: 60
        msg: "Rebooting to complete .NET Framework installation before SQL Server setup"
      when: needs_reboot | bool

    - name: Wait for system to be ready after reboot
      ansible.builtin.wait_for_connection:
        timeout: 300
      when: needs_reboot | bool

    # --- STEP 2: Check for existing installation ---
    - name: Check if SQL Server service already exists
      ansible.windows.win_service:
        name: "{{ 'MSSQL$' ~ mssql_instance_name if mssql_instance_name != 'MSSQLSERVER' else 'MSSQLSERVER' }}"
      register: mssql_service_check
      failed_when: false

    # --- STEP 3: Prepare data directories ---
    - name: Create SQL Server data directories
      ansible.windows.win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ mssql_data_dir }}"
        - "{{ mssql_log_dir }}"
        - "{{ mssql_temp_dir }}"
        - C:/Temp

    # --- STEP 4: Locate and copy SQL Server ISO ---
    - name: Check if ISO exists in Downloads directory
      ansible.windows.win_stat:
        path: "{{ mssql_iso_source_path }}"
      register: iso_source
      when: mssql_service_check.state is not defined

    - name: Assert ISO file exists
      ansible.builtin.assert:
        that:
          - iso_source.stat.exists is defined
          - iso_source.stat.exists
        fail_msg: |
          SQL Server ISO not found at {{ mssql_iso_source_path }}
          Please download the SQL Server ISO and place it in the Downloads directory.
          You can specify a custom path with -e "_mssql_iso_source_path=C:\Path\To\Your.iso"
        success_msg: "Found SQL Server ISO at {{ mssql_iso_source_path }}"
      when: mssql_service_check.state is not defined

    - name: Copy ISO to Temp directory
      ansible.windows.win_copy:
        src: "{{ mssql_iso_source_path }}"
        dest: "{{ mssql_iso_path }}"
        remote_src: true
      when: mssql_service_check.state is not defined

    - name: Mount SQL Server ISO
      ansible.windows.win_powershell:
        script: |
          $isoPath = "{{ mssql_iso_path }}"
          $mount = Mount-DiskImage -ImagePath $isoPath -PassThru
          $driveLetter = ($mount | Get-Volume).DriveLetter
          [PSCustomObject]@{
            MountPath = "${driveLetter}:\"
            DriveLetter = $driveLetter
          } | ConvertTo-Json
      register: iso_mount_result
      when: mssql_service_check.state is not defined

    - name: Parse ISO mount result
      ansible.builtin.set_fact:
        iso_mount_path: "{{ (iso_mount_result.output[0] | from_json).MountPath }}"
      when: mssql_service_check.state is not defined

    # --- STEP 5: Install SQL Server silently ---
    - name: Set security mode argument
      ansible.builtin.set_fact:
        security_mode_arg: "{{ '/SECURITYMODE=SQL' if mssql_auth_mode == 'Mixed' else '' }}"

    - name: Install SQL Server
      ansible.windows.win_package:
        path: "{{ iso_mount_path }}setup.exe"
        arguments: >-
          {{
            [
              '/Q',
              '/ACTION=Install',
              '/FEATURES=' + mssql_features,
              '/INSTANCENAME=' + mssql_instance_name,
              '/SQLCOLLATION=' + mssql_collation,
              '/SQLSYSADMINACCOUNTS=' + mssql_sysadmin_accounts,
              '/SQLSVCACCOUNT=NT AUTHORITY\\NETWORK SERVICE',
              '/AGTSVCACCOUNT=NT AUTHORITY\\NETWORK SERVICE',
              '/AGTSVCSTARTUPTYPE=Automatic',
              '/SQLTEMPDBDIR=' + mssql_temp_dir,
              '/SQLUSERDBDIR=' + mssql_data_dir,
              '/SQLUSERDBLOGDIR=' + mssql_log_dir,
              security_mode_arg,
              '/SAPWD=' + mssql_sa_password,
              '/TCPENABLED=1',
              '/UPDATEENABLED=False',
              '/IACCEPTSQLSERVERLICENSETERMS'
            ] | select | list
          }}
        product_id: '{skip}'
        expected_return_code: [0, 3010]
      register: mssql_install
      when: mssql_service_check.state is not defined

    # --- STEP 6: Unmount the ISO ---
    - name: Unmount SQL Server ISO
      ansible.windows.win_powershell:
        script: |
          $isoPath = "{{ mssql_iso_path }}"
          Dismount-DiskImage -ImagePath $isoPath
      when: mssql_service_check.state is not defined

    # --- STEP 7: Reboot if required by installer ---
    - name: Reboot if SQL Server installer requires it
      ansible.windows.win_reboot:
        reboot_timeout: 600
        post_reboot_delay: 30
      when:
        - mssql_install is defined
        - mssql_install.rc | default(0) == 3010

    # --- STEP 8: Configure TCP port ---
    - name: Configure SQL Server TCP port
      ansible.windows.win_powershell:
        script: |
          Import-Module SqlServer -ErrorAction SilentlyContinue
          $smo = 'Microsoft.SqlServer.Management.Smo'
          $wmi = New-Object ("$smo.Wmi.ManagedComputer") $env:COMPUTERNAME
          $instance = '{{ mssql_instance_name }}'
          $tcp = $wmi.ServerInstances[$instance].ServerProtocols['Tcp']
          $tcp.IsEnabled = $true
          $ipAll = $tcp.IPAddresses | Where-Object { $_.Name -eq 'IPAll' }
          $ipAll.IPAddressProperties['TcpPort'].Value = '{{ mssql_tcp_port }}'
          $ipAll.IPAddressProperties['TcpDynamicPorts'].Value = ''
          $tcp.Alter()
      register: tcp_config
      changed_when: true
      notify: restart sql server

    # --- STEP 9: Configure max server memory ---
    - name: Set SQL Server max memory to {{ mssql_max_memory_mb }} MB
      ansible.windows.win_powershell:
        script: |
          Invoke-Sqlcmd -Query "
            EXEC sp_configure 'show advanced options', 1;
            RECONFIGURE;
            EXEC sp_configure 'max server memory', {{ mssql_max_memory_mb }};
            RECONFIGURE;
          " -ServerInstance "localhost\{{ mssql_instance_name if mssql_instance_name != 'MSSQLSERVER' else '' }}" -TrustServerCertificate
      changed_when: true

    # --- STEP 10: Open firewall for SQL Server ---
    - name: Open firewall port for SQL Server
      community.windows.win_firewall_rule:
        name: SQL Server (TCP {{ mssql_tcp_port }})
        localport: "{{ mssql_tcp_port }}"
        protocol: tcp
        direction: in
        action: allow
        enabled: true
        state: present

    - name: Open firewall port for SQL Server Browser
      community.windows.win_firewall_rule:
        name: SQL Server Browser (UDP 1434)
        localport: 1434
        protocol: udp
        direction: in
        action: allow
        enabled: true
        state: present

    # --- STEP 11: Ensure services are running ---
    - name: Ensure SQL Server service is running
      ansible.windows.win_service:
        name: "{{ 'MSSQL$' ~ mssql_instance_name if mssql_instance_name != 'MSSQLSERVER' else 'MSSQLSERVER' }}"
        start_mode: auto
        state: started

    - name: Ensure SQL Server Agent is running
      ansible.windows.win_service:
        name: "{{ 'SQLAgent$' ~ mssql_instance_name if mssql_instance_name != 'MSSQLSERVER' else 'SQLSERVERAGENT' }}"
        start_mode: auto
        state: started

    - name: Ensure SQL Server Browser is running
      ansible.windows.win_service:
        name: SQLBrowser
        start_mode: auto
        state: started

    # --- STEP 12: Verify the installation ---
    - name: Verify SQL Server is responding
      ansible.windows.win_powershell:
        script: |
          $result = Invoke-Sqlcmd -Query "
            SELECT
              SERVERPROPERTY('ProductVersion') AS Version,
              SERVERPROPERTY('Edition') AS Edition,
              SERVERPROPERTY('InstanceName') AS Instance,
              @@SERVERNAME AS ServerName
          " -ServerInstance "localhost" -TrustServerCertificate
          $result | Format-Table -AutoSize | Out-String
      register: mssql_verify
      changed_when: false

    - name: Display SQL Server installation details
      ansible.builtin.debug:
        var: mssql_verify.output

  handlers:
    - name: Restart SQL Server
      listen: restart sql server
      ansible.windows.win_service:
        name: "{{ 'MSSQL$' ~ mssql_instance_name if mssql_instance_name != 'MSSQLSERVER' else 'MSSQLSERVER' }}"
        state: restarted
        force_dependent_services: true
