---
controller_credentials:
  - name: "Windows Demo Credential"
    description: !unsafe ''
    credential_type: "Machine"
    organization: "Default"
    inputs:
      username: "Administrator"
      password: ''

controller_inventories:
  - name: "Windows Inventory"
    description: !unsafe ''
    organization: "Default"
    prevent_instance_group_fallback: false

controller_templates:
  - name: "WINDOWS / AD / Deploy Primary Domain Controller"
    description: !unsafe ''
    organization: "Default"
    project: "Ansible Examples"
    inventory: "Windows Inventory"
    playbook: "windows_examples/ad_deploy_primary_dc.yml"
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 1
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - "Windows Demo Credential"
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    custom_virtualenv: ""
    host_config_key: ""
    labels:
      - "Windows"
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
    survey_enabled: true
    survey_spec:
      name: ""
      description: ""
      spec:
        - variable: _hosts
          question_name: !unsafe "What is the target server name or pattern?"
          type: text
          required: true
          min: 0
          max: 1024
          new_question: true
        - variable: domain_name
          question_name: !unsafe "What is the AD domain FQDN?"
          question_description: !unsafe "e.g. example.local"
          type: text
          required: false
          default: !unsafe "example.local"
          min: 0
          max: 1024
          new_question: false
        - variable: domain_netbios_name
          question_name: !unsafe "What is the NetBIOS domain name?"
          question_description: !unsafe "Short name, uppercase, e.g. EXAMPLE"
          type: text
          required: false
          default: !unsafe "EXAMPLE"
          min: 0
          max: 15
          new_question: false
        - variable: safe_mode_password
          question_name: !unsafe "Enter the DSRM (Directory Services Restore Mode) password"
          type: password
          required: true
          min: 0
          max: 1024
          new_question: false

  - name: "WINDOWS / AD / Join Domain"
    description: !unsafe ''
    organization: "Default"
    project: "Ansible Examples"
    inventory: "Windows Inventory"
    playbook: "windows_examples/ad_join_domain.yml"
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 1
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - "Windows Demo Credential"
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    custom_virtualenv: ""
    host_config_key: ""
    labels:
      - "Windows"
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
    survey_enabled: true
    survey_spec:
      name: ""
      description: ""
      spec:
        - variable: _hosts
          question_name: !unsafe "What is the target server name or pattern?"
          type: text
          required: true
          min: 0
          max: 1024
          new_question: true
        - variable: domain_controller
          question_name: !unsafe "What is the hostname or IP of the domain controller?"
          type: text
          required: true
          min: 0
          max: 1024
          new_question: false
        - variable: domain_name
          question_name: !unsafe "What is the AD domain FQDN?"
          question_description: !unsafe "e.g. example.local"
          type: text
          required: false
          default: !unsafe "example.local"
          min: 0
          max: 1024
          new_question: false
        - variable: domain_admin_user
          question_name: !unsafe "What is the domain admin username?"
          type: text
          required: false
          default: !unsafe "Administrator"
          min: 0
          max: 1024
          new_question: false
        - variable: domain_admin_password
          question_name: !unsafe "Enter the domain admin password"
          type: password
          required: true
          min: 0
          max: 1024
          new_question: false

controller_workflows:
  - name: "WINDOWS / AD / Full AD Deployment"
    description: !unsafe 'Deploy primary DC then join additional servers to the domain'
    organization: "Default"
    simplified_workflow_nodes:
      - identifier: "Deploy Primary DC"
        workflow_job_template: "WINDOWS / AD / Full AD Deployment"
        unified_job_template: "WINDOWS / AD / Deploy Primary Domain Controller"
        limit: ""
        organization: "Default"
        all_parents_must_converge: "False"
        success_nodes:
          - "Join Domain"
      - identifier: "Join Domain"
        workflow_job_template: "WINDOWS / AD / Full AD Deployment"
        unified_job_template: "WINDOWS / AD / Join Domain"
        limit: ""
        organization: "Default"
        all_parents_must_converge: "False"
    ask_variables_on_launch: "True"
    allow_simultaneous: "False"
    scm_branch: ""
    limit: ""
    ask_limit_on_launch: false
    ask_inventory_on_launch: false
    webhook_service: ""
    extra_vars: ""
    labels:
      - "Windows"
    survey_enabled: false

...
