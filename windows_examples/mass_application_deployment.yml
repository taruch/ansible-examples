---
# Large-scale application deployment to thousands of Windows machines
# Use case: Deploy an executable to 2,500+ machines with validation and rollback capability
# Optimized for performance with parallel execution and smart batching
#
# BATCH SIZE CONSIDERATIONS (serial parameter):
#
# The batch size (serial) determines how many hosts are processed simultaneously and directly
# impacts both deployment speed and AAP infrastructure load. Key factors to consider:
#
# 1. AAP Execution Node Capacity:
#    - CPU: Each active host connection consumes ~1-5% CPU during install operations
#    - Memory: ~50-100MB per active host connection for task state and output buffering
#    - Example: 500 concurrent hosts = ~2-25 cores, ~25-50GB RAM needed
#    - Monitor node CPU/memory during deployment and adjust batch size accordingly
#
# 2. Network Bandwidth:
#    - Installer downloads happen concurrently within each batch
#    - Example: 500 hosts downloading 500MB installer = 250GB total bandwidth spike
#    - Consider pre-staging installers to internal file shares to reduce WAN impact
#    - Stagger batches if limited bandwidth between AAP and target networks
#
# 3. Source Infrastructure Load:
#    - Artifact repository (Artifactory, Nexus, S3) must handle concurrent downloads
#    - File servers must support SMB connection limits if using network shares
#    - Web servers serving installers need adequate connection pooling
#    - Example: 1000 concurrent downloads may overwhelm a single web server
#
# 4. Database Connection Limits (AAP):
#    - Each active host requires database connections for job event logging
#    - Default PostgreSQL max_connections often set to 200-500
#    - Large batches (>500 hosts) can exhaust connection pools
#    - Symptoms: "too many connections" errors, job hangs, slow dashboard updates
#
# 5. Target Network Impact:
#    - Concurrent WinRM connections can saturate network links
#    - DNS query spikes when resolving hundreds of hostnames simultaneously
#    - Domain controllers may experience authentication load spikes
#    - Firewall state table limits can be reached with massive concurrent connections
#
# 6. Blast Radius and Risk Management:
#    - Smaller batches limit exposure if a bad installer is deployed
#    - 10% batches allow stopping after 10% failure vs 50% with larger batches
#    - Early detection of issues (OS incompatibility, missing dependencies)
#    - Easier rollback coordination with smaller affected populations
#
# 7. Observability and Monitoring:
#    - Smaller batches make AAP job output more readable in real-time
#    - Easier to identify patterns in failures across batches
#    - Better granularity for deployment progress tracking
#    - Reduced risk of overwhelming logging infrastructure
#
# SIZING RECOMMENDATIONS:
#
# Small deployment (< 100 hosts):
#   serial: "50%"  # Fast completion, minimal infrastructure impact
#
# Medium deployment (100-500 hosts):
#   serial: "25%"  # Balance speed vs infrastructure load
#
# Large deployment (500-2500 hosts):
#   serial: "20%"  # Default - proven for enterprise scale
#   forks: 50      # Set in AAP job template settings
#
# Very large deployment (2500+ hosts):
#   serial: "10%"  # Conservative - limits blast radius and infrastructure load
#   forks: 50-100  # Requires beefy execution nodes (16+ cores, 64GB+ RAM)
#
# Critical infrastructure (production databases, domain controllers):
#   serial: 1-5    # Absolute number, not percentage - deploy one at a time
#
# MONITORING DURING DEPLOYMENT:
#   - Watch AAP execution node CPU/memory in AAP admin UI or via Prometheus
#   - Monitor PostgreSQL connection count: SELECT count(*) FROM pg_stat_activity;
#   - Check artifact repository bandwidth and connection metrics
#   - Observe target network utilization and DNS query rates
#   - Review AAP job output for patterns (timeouts, connection refused, etc.)

- name: Mass Application Deployment to Windows Hosts
  hosts: "{{ _hosts | default('all') }}"
  gather_facts: false
  serial: "{{ batch_size | default('20%') }}"  # Process 20% of hosts at a time by default

  vars:
    # Application deployment settings (override via survey or extra vars)
    app_source_path: "https://artifacts.example.com/apps/MyApp_v2.5.exe"
    app_destination: 'C:\Windows\Temp\MyApp_v2.5.exe'
    app_install_path: 'C:\Program Files\MyApp'
    app_name: "MyApplication"
    app_version: "2.5.0"

    # Installation parameters
    install_arguments: '/S /D={{ app_install_path }}'  # Silent install to specified directory
    reboot_required: false
    max_install_timeout: 600  # 10 minutes

    # Validation settings
    validate_installation: true
    app_executable: 'MyApp.exe'
    expected_service_name: "MyAppService"  # Leave empty if no service

    # Rollback settings
    enable_rollback: true
    backup_existing: true
    backup_path: 'C:\Windows\Temp\MyApp_backup'

    # Pre-deployment checks
    minimum_disk_space_gb: 2
    required_os_versions:
      - "Microsoft Windows Server 2016"
      - "Microsoft Windows Server 2019"
      - "Microsoft Windows Server 2022"
      - "Microsoft Windows 10"
      - "Microsoft Windows 11"

  tasks:
    - name: Gather minimal facts for deployment
      ansible.windows.setup:
        gather_subset:
          - '!all'
          - '!min'
          - distribution
          - distribution_version

    - name: Pre-deployment validation block
      block:
        - name: Check available disk space
          ansible.windows.win_powershell:
            script: |
              $drive = "{{ app_destination.split(':')[0] }}"
              $volume = Get-Volume -DriveLetter $drive -ErrorAction SilentlyContinue
              if ($volume) {
                  $freeSpaceGB = [math]::Round($volume.SizeRemaining / 1GB, 2)
                  [PSCustomObject]@{
                      drive = $drive
                      free_space_gb = $freeSpaceGB
                      sufficient = $freeSpaceGB -ge {{ minimum_disk_space_gb }}
                  }
              }
          register: disk_check

        - name: Fail if insufficient disk space
          ansible.builtin.fail:
            msg: "Insufficient disk space. Required: {{ minimum_disk_space_gb }}GB, Available: {{ disk_check.output[0].free_space_gb }}GB"
          when:
            - disk_check.output is defined
            - not disk_check.output[0].sufficient | bool

        - name: Check if application is already installed with correct version
          ansible.windows.win_powershell:
            script: |
              $app = Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" |
                     Where-Object { $_.DisplayName -like "*{{ app_name }}*" } |
                     Select-Object DisplayName, DisplayVersion, InstallLocation

              if ($app) {
                  [PSCustomObject]@{
                      installed = $true
                      name = $app.DisplayName
                      version = $app.DisplayVersion
                      location = $app.InstallLocation
                      is_target_version = $app.DisplayVersion -eq "{{ app_version }}"
                  }
              } else {
                  [PSCustomObject]@{
                      installed = $false
                      is_target_version = $false
                  }
              }
          register: app_check

        - name: Skip if correct version already installed
          ansible.builtin.meta: end_host
          when:
            - app_check.output is defined
            - app_check.output[0].installed | bool
            - app_check.output[0].is_target_version | bool

      tags: ['pre-check']

    - name: Backup existing installation
      block:
        - name: Check if application exists
          ansible.windows.win_stat:
            path: "{{ app_install_path }}"
          register: existing_app

        - name: Create backup directory
          ansible.windows.win_file:
            path: "{{ backup_path }}"
            state: directory
          when:
            - existing_app.stat.exists
            - backup_existing | bool

        - name: Backup existing installation
          ansible.windows.win_powershell:
            script: |
              $source = "{{ app_install_path }}"
              $dest = "{{ backup_path }}\MyApp_backup_$(Get-Date -Format 'yyyyMMdd_HHmmss')"

              if (Test-Path $source) {
                  Copy-Item -Path $source -Destination $dest -Recurse -Force
                  [PSCustomObject]@{
                      backed_up = $true
                      backup_location = $dest
                      backup_size_mb = [math]::Round((Get-ChildItem $dest -Recurse |
                                       Measure-Object -Property Length -Sum).Sum / 1MB, 2)
                  }
              } else {
                  [PSCustomObject]@{
                      backed_up = $false
                      reason = "Source path does not exist"
                  }
              }
          register: backup_result
          when:
            - existing_app.stat.exists
            - backup_existing | bool

      when: enable_rollback | bool
      tags: ['backup']

    - name: Download application installer
      ansible.windows.win_get_url:
        url: "{{ app_source_path }}"
        dest: "{{ app_destination }}"
        timeout: 120
        force: true
      register: download_result
      retries: 3
      delay: 10
      until: download_result is succeeded

    - name: Verify downloaded file integrity
      ansible.windows.win_stat:
        path: "{{ app_destination }}"
        checksum_algorithm: sha256
      register: downloaded_file

    - name: Install application
      ansible.windows.win_package:
        path: "{{ app_destination }}"
        arguments: "{{ install_arguments }}"
        state: present
        product_id: "{{ app_name }}"
        expected_return_code: [0, 3010]  # 0 = success, 3010 = success with reboot required
      register: install_result
      async: "{{ max_install_timeout }}"
      poll: 10

    - name: Post-installation validation
      block:
        - name: Wait for installation to complete
          ansible.builtin.wait_for:
            timeout: 30

        - name: Verify application installation
          ansible.windows.win_powershell:
            script: |
              $checks = @{
                  timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
                  installation_verified = $false
                  executable_exists = $false
                  service_running = $false
                  registry_entry_exists = $false
              }

              # Check registry
              $app = Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" |
                     Where-Object { $_.DisplayName -like "*{{ app_name }}*" }
              $checks.registry_entry_exists = $app -ne $null

              # Check executable
              $exePath = Join-Path "{{ app_install_path }}" "{{ app_executable }}"
              $checks.executable_exists = Test-Path $exePath
              if ($checks.executable_exists) {
                  $checks.executable_path = $exePath
                  $exeVersion = (Get-Item $exePath).VersionInfo.FileVersion
                  $checks.executable_version = $exeVersion
              }

              # Check service if applicable
              {% if expected_service_name %}
              $service = Get-Service -Name "{{ expected_service_name }}" -ErrorAction SilentlyContinue
              if ($service) {
                  $checks.service_running = $service.Status -eq 'Running'
                  $checks.service_status = $service.Status
              }
              {% endif %}

              # Overall validation
              $checks.installation_verified = $checks.registry_entry_exists -and $checks.executable_exists
              {% if expected_service_name %}
              $checks.installation_verified = $checks.installation_verified -and $checks.service_running
              {% endif %}

              [PSCustomObject]$checks
          register: validation_result

        - name: Fail if validation fails
          ansible.builtin.fail:
            msg: "Application validation failed: {{ validation_result.output[0] }}"
          when:
            - validate_installation | bool
            - not validation_result.output[0].installation_verified | bool

      when: validate_installation | bool
      tags: ['validate']

    - name: Cleanup installer file
      ansible.windows.win_file:
        path: "{{ app_destination }}"
        state: absent

    - name: Set deployment stats
      ansible.builtin.set_stats:
        data:
          deployed_version: "{{ app_version }}"
          deployment_status: "{{ 'success' if validation_result.output[0].installation_verified else 'failed' }}"
          executable_verified: "{{ validation_result.output[0].executable_exists }}"
          backup_created: "{{ backup_result.backed_up | default(false) }}"

    - name: Report deployment success
      ansible.builtin.debug:
        msg:
          - "=== DEPLOYMENT SUCCESSFUL ==="
          - "Host: {{ inventory_hostname }}"
          - "Application: {{ app_name }} v{{ app_version }}"
          - "Install Path: {{ app_install_path }}"
          - "Validation: {{ validation_result.output[0] }}"
          - "Backup: {{ backup_result.backup_location | default('Not created') }}"

  rescue:
    - name: Deployment failed - initiate rollback
      block:
        - name: Log deployment failure
          ansible.builtin.debug:
            msg:
              - "DEPLOYMENT FAILED on {{ inventory_hostname }}"
              - "Error: {{ ansible_failed_result.msg | default('Unknown error') }}"

        - name: Restore from backup if available
          ansible.windows.win_powershell:
            script: |
              $backupPath = "{{ backup_result.backup_location | default('') }}"
              $installPath = "{{ app_install_path }}"

              if (Test-Path $backupPath) {
                  # Remove failed installation
                  if (Test-Path $installPath) {
                      Remove-Item -Path $installPath -Recurse -Force
                  }

                  # Restore backup
                  Copy-Item -Path $backupPath -Destination $installPath -Recurse -Force

                  [PSCustomObject]@{
                      rollback_successful = $true
                      restored_from = $backupPath
                  }
              } else {
                  [PSCustomObject]@{
                      rollback_successful = $false
                      reason = "No backup available"
                  }
              }
          register: rollback_result
          when:
            - enable_rollback | bool
            - backup_result.backed_up | default(false) | bool

        - name: Set failure stats
          ansible.builtin.set_stats:
            data:
              deployment_status: "failed"
              rollback_attempted: "{{ enable_rollback }}"
              rollback_successful: "{{ rollback_result.output[0].rollback_successful | default(false) }}"

        - name: Re-raise the error
          ansible.builtin.fail:
            msg: "Deployment failed on {{ inventory_hostname }}"

      when: enable_rollback | bool
