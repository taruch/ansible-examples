---
- name: Get all disk volumes
  ansible.windows.win_powershell:
    script: |
      Get-Volume |
        Where-Object { $_.DriveLetter -ne $null -and $_.DriveType -eq 'Fixed' } |
        Select-Object DriveLetter,
          FileSystemLabel,
          FileSystem,
          @{Name='SizeGB';Expression={[math]::Round($_.Size / 1GB, 2)}},
          @{Name='UsedGB';Expression={[math]::Round(($_.Size - $_.SizeRemaining) / 1GB, 2)}},
          @{Name='FreeGB';Expression={[math]::Round($_.SizeRemaining / 1GB, 2)}},
          @{Name='PercentUsed';Expression={
            if ($_.Size -gt 0) {
              [math]::Round((($_.Size - $_.SizeRemaining) / $_.Size) * 100, 2)
            } else { 0 }
          }},
          HealthStatus
  register: all_volumes

- name: Get detailed disk performance counters
  ansible.windows.win_powershell:
    script: |
      $drives = (Get-Volume | Where-Object { $_.DriveLetter -ne $null -and $_.DriveType -eq 'Fixed' }).DriveLetter
      $results = @{}

      foreach ($drive in $drives) {
          try {
              $diskCounters = Get-Counter -Counter @(
                  "\PhysicalDisk(*)\Current Disk Queue Length",
                  "\PhysicalDisk(*)\Avg. Disk sec/Read",
                  "\PhysicalDisk(*)\Avg. Disk sec/Write",
                  "\PhysicalDisk(*)\Disk Reads/sec",
                  "\PhysicalDisk(*)\Disk Writes/sec"
              ) -ErrorAction SilentlyContinue

              $driveKey = [string]$drive
              $results[$driveKey] = @{}
              foreach ($counter in $diskCounters.CounterSamples) {
                  $counterName = [string](($counter.Path -split '\\')[-1])
                  $results[$driveKey][$counterName] = [math]::Round($counter.CookedValue, 2)
              }
          } catch {}
      }
      $results
  register: disk_counters

- name: Find top 10 largest folders on critical drives
  ansible.windows.win_powershell:
    script: |
      $criticalDrives = @()
      $volumes = Get-Volume | Where-Object { $_.DriveLetter -ne $null -and $_.DriveType -eq 'Fixed' }

      foreach ($vol in $volumes) {
          $percentUsed = if ($vol.Size -gt 0) { (($vol.Size - $vol.SizeRemaining) / $vol.Size) * 100 } else { 0 }
          if ($percentUsed -gt {{ alert_threshold }}) {
              $criticalDrives += $vol.DriveLetter
          }
      }

      $folderSizes = @()
      foreach ($drive in $criticalDrives) {
          try {
              $drivePath = "$($drive):\"
              $folders = Get-ChildItem -Path $drivePath -Directory -ErrorAction SilentlyContinue

              foreach ($folder in $folders) {
                  try {
                      $size = (Get-ChildItem -Path $folder.FullName -Recurse -File -ErrorAction SilentlyContinue |
                               Measure-Object -Property Length -Sum).Sum

                      if ($size -gt 0) {
                          $folderSizes += [PSCustomObject]@{
                              Drive = $drive
                              Path = $folder.FullName
                              SizeGB = [math]::Round($size / 1GB, 2)
                              SizeMB = [math]::Round($size / 1MB, 2)
                              LastModified = $folder.LastWriteTime
                          }
                      }
                  } catch {}
              }
          } catch {}
      }

      $folderSizes | Sort-Object SizeGB -Descending | Select-Object -First {{ top_folder_count }}
  register: large_folders
  async: 300
  poll: 10

- name: Find large files on critical drives
  ansible.windows.win_powershell:
    script: |
      $criticalDrives = @()
      $volumes = Get-Volume | Where-Object { $_.DriveLetter -ne $null -and $_.DriveType -eq 'Fixed' }

      foreach ($vol in $volumes) {
          $percentUsed = if ($vol.Size -gt 0) { (($vol.Size - $vol.SizeRemaining) / $vol.Size) * 100 } else { 0 }
          if ($percentUsed -gt {{ alert_threshold }}) {
              $criticalDrives += $vol.DriveLetter
          }
      }

      $largeFiles = @()
      foreach ($drive in $criticalDrives) {
          try {
              $drivePath = "$($drive):\"
              $files = Get-ChildItem -Path $drivePath -Recurse -File -ErrorAction SilentlyContinue |
                       Where-Object { $_.Length -gt ({{ large_file_size_mb }} * 1MB) } |
                       Sort-Object Length -Descending |
                       Select-Object -First 20 FullName,
                         @{Name='SizeMB';Expression={[math]::Round($_.Length / 1MB, 2)}},
                         @{Name='SizeGB';Expression={[math]::Round($_.Length / 1GB, 2)}},
                         Extension,
                         LastWriteTime,
                         CreationTime

              $largeFiles += $files
          } catch {}
      }

      $largeFiles | Sort-Object SizeMB -Descending | Select-Object -First 20
  register: large_files
  async: 300
  poll: 10

- name: Check for Windows log files
  ansible.windows.win_powershell:
    script: |
      $logPaths = @(
          "C:\Windows\Logs",
          "C:\Windows\System32\LogFiles",
          "C:\Windows\Temp",
          "C:\inetpub\logs" # IIS logs if present
      )

      $logSizes = @()
      foreach ($path in $logPaths) {
          if (Test-Path $path) {
              try {
                  $size = (Get-ChildItem -Path $path -Recurse -File -ErrorAction SilentlyContinue |
                           Measure-Object -Property Length -Sum).Sum

                  $logSizes += [PSCustomObject]@{
                      Path = $path
                      SizeGB = [math]::Round($size / 1GB, 2)
                      SizeMB = [math]::Round($size / 1MB, 2)
                  }
              } catch {}
          }
      }
      $logSizes
  register: log_sizes

- name: Check Windows Update cache
  ansible.windows.win_powershell:
    script: |
      $wuCachePath = "C:\Windows\SoftwareDistribution\Download"
      if (Test-Path $wuCachePath) {
          $size = (Get-ChildItem -Path $wuCachePath -Recurse -File -ErrorAction SilentlyContinue |
                   Measure-Object -Property Length -Sum).Sum
          [PSCustomObject]@{
              Path = $wuCachePath
              SizeGB = [math]::Round($size / 1GB, 2)
              SizeMB = [math]::Round($size / 1MB, 2)
          }
      }
  register: windows_update_cache

- name: Display disk alert summary
  ansible.builtin.debug:
    msg:
      - "=== HIGH DISK USAGE ALERT INVESTIGATION ==="
      - "Host: {{ inventory_hostname }}"
      - "Alert Time: {{ ansible_date_time.iso8601 }}"
      - "Threshold: {{ alert_threshold }}%"
      - "=== DISK VOLUMES ==="
      - "{{ all_volumes.output }}"
      - "=== DISK PERFORMANCE COUNTERS ==="
      - "{{ disk_counters.output[0] }}"
      - "=== TOP {{ top_folder_count }} LARGEST FOLDERS ==="
      - "{{ large_folders.output }}"
      - "=== LARGE FILES (>{{ large_file_size_mb }}MB) ==="
      - "{{ large_files.output }}"
      - "=== LOG FILE SIZES ==="
      - "{{ log_sizes.output }}"
      - "=== WINDOWS UPDATE CACHE ==="
      - "{{ windows_update_cache.output }}"

- name: Create report directory on controller
  ansible.builtin.file:
    path: "{{ report_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Generate detailed JSON report
  ansible.builtin.copy:
    content: |
      {
        "alert_type": "high_disk_usage",
        "host": "{{ inventory_hostname }}",
        "timestamp": "{{ ansible_date_time.iso8601 }}",
        "threshold_percent": {{ alert_threshold }},
        "disk_volumes": {{ all_volumes.output | to_json }},
        "disk_performance_counters": {{ disk_counters.output[0] | to_json }},
        "largest_folders": {{ large_folders.output | to_json }},
        "large_files": {{ large_files.output | to_json }},
        "log_file_sizes": {{ log_sizes.output | to_json }},
        "windows_update_cache": {{ windows_update_cache.output | to_json }},
        "critical_drives": {{ all_volumes.output |
            selectattr('PercentUsed', 'gt', alert_threshold) |
            map(attribute='DriveLetter') | list | to_json }}
      }
    dest: "{{ report_dir }}/disk_alert_{{ inventory_hostname }}_{{ ansible_date_time.epoch }}.json"
  delegate_to: localhost

- name: Check if any drive exceeds threshold
  ansible.builtin.set_fact:
    critical_drives: "{{ all_volumes.output | selectattr('PercentUsed', 'gt', alert_threshold) | list }}"
