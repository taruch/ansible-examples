---
- name: Gather system facts
  ansible.builtin.setup:
    gather_subset:
      - hardware
      - mounts
      - date_time

- name: Get disk usage for all filesystems
  ansible.builtin.shell: |
    df -h -x tmpfs -x devtmpfs -x squashfs | awk 'NR>1 {print $1,$2,$3,$4,$5,$6}' | sed 's/%//'
  register: df_output
  changed_when: false

- name: Parse disk usage
  ansible.builtin.set_fact:
    disk_volumes: "{{ disk_volumes | default([]) + [{'filesystem': item.split()[0], 'size': item.split()[1], 'used': item.split()[2], 'available': item.split()[3], 'percent_used': item.split()[4] | int, 'mount_point': item.split()[5]}] }}"
  loop: "{{ df_output.stdout_lines }}"

- name: Identify critical filesystems
  ansible.builtin.set_fact:
    critical_filesystems: "{{ disk_volumes | selectattr('percent_used', 'gt', alert_threshold) | list }}"

- name: Get inode usage
  ansible.builtin.shell: |
    df -i | awk 'NR>1 && !/tmpfs|devtmpfs|squashfs/ {print $1,$2,$3,$4,$5,$6}' | sed 's/%//'
  register: df_inodes
  changed_when: false

- name: Parse inode usage
  ansible.builtin.set_fact:
    inode_usage: "{{ inode_usage | default([]) + [{'filesystem': item.split()[0], 'inodes_total': item.split()[1], 'inodes_used': item.split()[2], 'inodes_free': item.split()[3], 'inode_percent_used': item.split()[4] | int, 'mount_point': item.split()[5]}] }}"
  loop: "{{ df_inodes.stdout_lines }}"

- name: Find top 10 largest directories on critical filesystems
  ansible.builtin.shell: |
    for fs in {{ critical_filesystems | map(attribute='mount_point') | join(' ') }}; do
      du -x "$fs" --max-depth=2 2>/dev/null | sort -rn | head -{{ top_directory_count }} | awk -v fs="$fs" '{printf "%s|%s|%s\n", fs, $1, $2}'
    done
  register: large_directories_raw
  changed_when: false
  when: critical_filesystems | length > 0
  async: 300
  poll: 10

- name: Parse largest directories
  ansible.builtin.set_fact:
    largest_directories: "{{ largest_directories | default([]) + [{'filesystem': item.split('|')[0], 'size_kb': item.split('|')[1], 'size_mb': (item.split('|')[1] | int / 1024) | round(2), 'size_gb': (item.split('|')[1] | int / 1024 / 1024) | round(2), 'path': item.split('|')[2]}] }}"
  loop: "{{ large_directories_raw.stdout_lines }}"
  when:
    - large_directories_raw is defined
    - large_directories_raw is not skipped
    - large_directories_raw.stdout_lines is defined
    - large_directories_raw.stdout_lines | length > 0

- name: Find large files on critical filesystems
  ansible.builtin.shell: |
    for fs in {{ critical_filesystems | map(attribute='mount_point') | join(' ') }}; do
      find "$fs" -xdev -type f -size +{{ large_file_size_mb }}M -exec ls -lh {} \; 2>/dev/null | head -20 | awk '{printf "%s|%s|%s\n", $5, $6" "$7" "$8, $9}'
    done
  register: large_files_raw
  changed_when: false
  when: critical_filesystems | length > 0
  async: 300
  poll: 10

- name: Parse large files
  ansible.builtin.set_fact:
    large_files: "{{ large_files | default([]) + [{'size': item.split('|')[0], 'modified': item.split('|')[1], 'path': item.split('|')[2]}] }}"
  loop: "{{ large_files_raw.stdout_lines }}"
  when:
    - large_files_raw is defined
    - large_files_raw is not skipped
    - large_files_raw.stdout_lines is defined
    - large_files_raw.stdout_lines | length > 0

- name: Check common log directories
  ansible.builtin.shell: |
    for log_dir in /var/log /var/log/audit /var/log/nginx /var/log/apache2 /var/log/httpd; do
      if [ -d "$log_dir" ]; then
        size=$(du -sh "$log_dir" 2>/dev/null | awk '{print $1}')
        echo "$log_dir|$size"
      fi
    done
  register: log_dirs_raw
  changed_when: false

- name: Parse log directory sizes
  ansible.builtin.set_fact:
    log_directory_sizes: "{{ log_directory_sizes | default([]) + [{'path': item.split('|')[0], 'size': item.split('|')[1]}] }}"
  loop: "{{ log_dirs_raw.stdout_lines }}"
  when: log_dirs_raw.stdout_lines | length > 0

- name: Check package manager cache sizes
  ansible.builtin.shell: |
    if [ -d /var/cache/yum ]; then
      du -sh /var/cache/yum 2>/dev/null | awk '{print "yum|"$1}'
    fi
    if [ -d /var/cache/dnf ]; then
      du -sh /var/cache/dnf 2>/dev/null | awk '{print "dnf|"$1}'
    fi
    if [ -d /var/cache/apt ]; then
      du -sh /var/cache/apt 2>/dev/null | awk '{print "apt|"$1}'
    fi
    if [ -d /var/lib/docker ]; then
      du -sh /var/lib/docker 2>/dev/null | awk '{print "docker|"$1}'
    fi
  register: cache_sizes_raw
  changed_when: false

- name: Parse cache sizes
  ansible.builtin.set_fact:
    cache_sizes: "{{ cache_sizes | default([]) + [{'type': item.split('|')[0], 'size': item.split('|')[1]}] }}"
  loop: "{{ cache_sizes_raw.stdout_lines }}"
  when: cache_sizes_raw.stdout_lines | length > 0

- name: Get systemd journal size
  ansible.builtin.shell: |
    journalctl --disk-usage 2>/dev/null | awk '{print $(NF-1)" "$NF}' || echo "N/A"
  register: journal_size
  changed_when: false
  failed_when: false

- name: Check for deleted files still held open
  ansible.builtin.shell: |
    lsof -n 2>/dev/null | grep deleted | awk '{sum+=$7} END {print sum/1024/1024}' || echo 0
  register: deleted_open_files_mb
  changed_when: false
  failed_when: false

- name: Get oldest files in /tmp
  ansible.builtin.shell: |
    find /tmp -type f -printf '%T@ %s %p\n' 2>/dev/null | sort -n | head -10 | awk '{print $3"|"$2}'
  register: old_tmp_files
  changed_when: false
  failed_when: false

- name: Display disk alert summary
  ansible.builtin.debug:
    msg:
      - "=== HIGH DISK USAGE ALERT INVESTIGATION ==="
      - "Host: {{ inventory_hostname }}"
      - "Alert Time: {{ ansible_date_time.iso8601 }}"
      - "Threshold: {{ alert_threshold }}%"
      - "=== DISK VOLUMES ==="
      - "{{ disk_volumes }}"
      - "=== CRITICAL FILESYSTEMS (>{{ alert_threshold }}%) ==="
      - "{{ critical_filesystems | map(attribute='mount_point') | list | join(', ') if critical_filesystems | length > 0 else 'None' }}"
      - "=== INODE USAGE ==="
      - "{{ inode_usage }}"
      - "=== TOP {{ top_directory_count }} LARGEST DIRECTORIES ==="
      - "{{ largest_directories | default([]) }}"
      - "=== LARGE FILES (>{{ large_file_size_mb }}MB) ==="
      - "{{ large_files | default([]) }}"
      - "=== LOG DIRECTORY SIZES ==="
      - "{{ log_directory_sizes | default([]) }}"
      - "=== CACHE SIZES ==="
      - "{{ cache_sizes | default([]) }}"
      - "=== SYSTEMD JOURNAL SIZE ==="
      - "{{ journal_size.stdout }}"
      - "=== DELETED FILES HELD OPEN ==="
      - "{{ deleted_open_files_mb.stdout | float | round(2) }} MB"

- name: Create report directory on controller
  ansible.builtin.file:
    path: "{{ report_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Generate detailed JSON report
  ansible.builtin.copy:
    content: |
      {
        "alert_type": "high_disk_usage",
        "host": "{{ inventory_hostname }}",
        "timestamp": "{{ ansible_date_time.iso8601 }}",
        "threshold_percent": {{ alert_threshold }},
        "disk_volumes": {{ disk_volumes | to_json }},
        "inode_usage": {{ inode_usage | to_json }},
        "critical_filesystems": {{ critical_filesystems | map(attribute='mount_point') | list | to_json }},
        "largest_directories": {{ largest_directories | default([]) | to_json }},
        "large_files": {{ large_files | default([]) | to_json }},
        "log_directory_sizes": {{ log_directory_sizes | default([]) | to_json }},
        "cache_sizes": {{ cache_sizes | default([]) | to_json }},
        "journal_size": "{{ journal_size.stdout }}",
        "deleted_open_files_mb": {{ deleted_open_files_mb.stdout | default(0) | float | round(2) }},
        "system_info": {
          "os_distribution": "{{ ansible_distribution }}",
          "os_version": "{{ ansible_distribution_version }}",
          "kernel_version": "{{ ansible_kernel }}",
          "hostname": "{{ ansible_hostname }}",
          "fqdn": "{{ ansible_fqdn }}"
        }
      }
    dest: "{{ report_dir }}/disk_alert_{{ inventory_hostname }}_{{ ansible_date_time.epoch }}.json"
  delegate_to: localhost

- name: Alert if disk usage exceeds threshold
  ansible.builtin.assert:
    that:
      - critical_filesystems | length == 0
    fail_msg: "CRITICAL: {{ critical_filesystems | length }} filesystem(s) exceed {{ alert_threshold }}% usage threshold"
    success_msg: "All filesystems are within acceptable disk usage range"
  ignore_errors: true

- name: Build full alert report for workflow
  ansible.builtin.set_fact:
    alert_report_json: |
      {
        "alert_type": "high_disk_usage",
        "host": "{{ inventory_hostname }}",
        "timestamp": "{{ ansible_date_time.iso8601 }}",
        "threshold_percent": {{ alert_threshold }},
        "disk_volumes": {{ disk_volumes | to_json }},
        "inode_usage": {{ inode_usage | to_json }},
        "critical_filesystems": {{ critical_filesystems | map(attribute='mount_point') | list | to_json }},
        "largest_directories": {{ largest_directories | default([]) | to_json }},
        "large_files": {{ large_files | default([]) | to_json }},
        "log_directory_sizes": {{ log_directory_sizes | default([]) | to_json }},
        "cache_sizes": {{ cache_sizes | default([]) | to_json }},
        "journal_size": "{{ journal_size.stdout }}",
        "deleted_open_files_mb": {{ deleted_open_files_mb.stdout | default(0) | float | round(2) }},
        "large_file_size_mb": {{ large_file_size_mb }},
        "system_info": {
          "os_distribution": "{{ ansible_distribution }}",
          "os_version": "{{ ansible_distribution_version }}",
          "kernel_version": "{{ ansible_kernel }}",
          "hostname": "{{ ansible_hostname }}",
          "fqdn": "{{ ansible_fqdn }}"
        }
      }
