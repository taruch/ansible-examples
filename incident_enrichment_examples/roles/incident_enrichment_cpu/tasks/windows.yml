---
# Windows CPU investigation tasks

- name: Gather system facts
  ansible.builtin.setup:
    gather_subset:
      - hardware
      - processor
      - date_time

- name: Get current CPU usage percentage
  ansible.windows.win_powershell:
    script: |
      $cpu = Get-Counter '\Processor(_Total)\% Processor Time' -SampleInterval 2 -MaxSamples 3
      $avgCpu = ($cpu.CounterSamples.CookedValue | Measure-Object -Average).Average
      [PSCustomObject]@{
          CurrentCPU = [math]::Round($avgCpu, 2)
          Timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
      }
  register: cpu_usage

- name: Get top CPU consuming processes
  ansible.windows.win_powershell:
    script: |
      Get-Process |
        Where-Object { $_.CPU -gt 0 } |
        Sort-Object CPU -Descending |
        Select-Object -First {{ top_process_count }} Name,
          @{Name='CPU(s)';Expression={[math]::Round($_.CPU, 2)}},
          @{Name='Memory(MB)';Expression={[math]::Round($_.WorkingSet64 / 1MB, 2)}},
          Id,
          @{Name='Threads';Expression={$_.Threads.Count}},
          StartTime
  register: top_processes

- name: Get system performance counters
  ansible.windows.win_powershell:
    script: |
      $counters = @(
          '\Processor(_Total)\% Processor Time',
          '\Processor(_Total)\% Privileged Time',
          '\Processor(_Total)\% User Time',
          '\System\Processor Queue Length',
          '\System\Context Switches/sec'
      )
      $samples = Get-Counter -Counter $counters -SampleInterval 1 -MaxSamples 2

      $results = @{}
      foreach ($sample in $samples.CounterSamples) {
          $counterName = [string](($sample.Path -split '\\')[-1])
          if (-not $results.ContainsKey($counterName)) {
              $results[$counterName] = @()
          }
          $results[$counterName] += [math]::Round($sample.CookedValue, 2)
      }

      # Calculate averages
      $output = @{}
      foreach ($key in $results.Keys) {
          $keyString = [string]$key
          $output[$keyString] = [math]::Round(($results[$key] | Measure-Object -Average).Average, 2)
      }
      $output
  register: perf_counters

- name: Check for Windows Update service status
  ansible.windows.win_service_info:
    name: wuauserv
  register: windows_update_service

- name: Get scheduled tasks that are running
  ansible.windows.win_powershell:
    script: |
      Get-ScheduledTask |
        Where-Object { $_.State -eq 'Running' } |
        Select-Object TaskName, TaskPath, State
  register: running_tasks

- name: Calculate system uptime in hours
  ansible.windows.win_powershell:
    script: |
      $uptime = (Get-Date) - (Get-CimInstance Win32_OperatingSystem).LastBootUpTime
      [PSCustomObject]@{
          UptimeSeconds = [math]::Round($uptime.TotalSeconds, 0)
          UptimeHours = [math]::Round($uptime.TotalHours, 2)
          LastBootTime = (Get-CimInstance Win32_OperatingSystem).LastBootUpTime.ToString("yyyy-MM-dd HH:mm:ss")
      }
  register: system_uptime

- name: Get processor information
  ansible.windows.win_powershell:
    script: |
      $proc = Get-CimInstance Win32_Processor | Select-Object -First 1
      $allProcs = @(Get-CimInstance Win32_Processor)
      [PSCustomObject]@{
          Name = $proc.Name
          NumberOfCores = $proc.NumberOfCores
          NumberOfLogicalProcessors = $proc.NumberOfLogicalProcessors
          ProcessorCount = $allProcs.Count
      }
  register: processor_info

- name: Get OS and hostname information
  ansible.windows.win_powershell:
    script: |
      $os = Get-CimInstance Win32_OperatingSystem
      $cs = Get-CimInstance Win32_ComputerSystem
      [PSCustomObject]@{
          OSName = $os.Caption
          OSVersion = $os.Version
          Hostname = $cs.Name
      }
  register: os_info

- name: Build full alert report for workflow
  ansible.builtin.set_fact:
    alert_report_json: |
      {
        "alert_type": "high_cpu",
        "host": "{{ inventory_hostname }}",
        "timestamp": "{{ cpu_usage.output[0].Timestamp }}",
        "cpu_metrics": {
          "current_cpu_percent": {{ cpu_usage.output[0].CurrentCPU }},
          "threshold_percent": {{ cpu_threshold }},
          "processor_info": {
            "name": "{{ processor_info.output[0].Name }}",
            "physical_count": {{ processor_info.output[0].ProcessorCount }},
            "cores_per_processor": {{ processor_info.output[0].NumberOfCores }},
            "logical_processors": {{ processor_info.output[0].NumberOfLogicalProcessors }}
          },
          "performance_counters": {{ perf_counters.output[0] | to_json }}
        },
        "system_info": {
          "uptime_hours": {{ system_uptime.output[0].UptimeHours }},
          "uptime_seconds": {{ system_uptime.output[0].UptimeSeconds }},
          "last_boot_time": "{{ system_uptime.output[0].LastBootTime }}",
          "os_name": "{{ os_info.output[0].OSName }}",
          "os_version": "{{ os_info.output[0].OSVersion }}",
          "hostname": "{{ os_info.output[0].Hostname }}"
        },
        "top_processes": {{ top_processes.output | to_json }},
        "running_scheduled_tasks": {{ running_tasks.output | to_json }},
        "windows_update_status": "{{ windows_update_service.services[0].state if windows_update_service.services else 'Not Found' }}"
      }
