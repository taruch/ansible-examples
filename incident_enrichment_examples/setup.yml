---
- name: Setup Incident Enrichment Workflow in AAP (Configuration as Code)
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    controller_username: "{{ vault_aap_username | default(lookup('env', 'CONTROLLER_USERNAME')) }}"
    controller_password: "{{ vault_aap_password | default(lookup('env', 'CONTROLLER_PASSWORD')) }}"
    controller_hostname: "{{ vault_aap_hostname | default(lookup('env', 'CONTROLLER_HOST')) }}"
    controller_validate_certs: "{{ vault_aap_validate_certs | default(lookup('env', 'CONTROLLER_VERIFY_SSL')) | default('false') }}"
    aap_username: "{{ vault_aap_username | default(lookup('env', 'CONTROLLER_USERNAME')) }}"
    aap_password: "{{ vault_aap_password | default(lookup('env', 'CONTROLLER_PASSWORD')) }}"
    aap_hostname: "{{ vault_aap_hostname | default(lookup('env', 'CONTROLLER_HOST')) }}"
    aap_validate_certs: "{{ vault_aap_validate_certs | default(lookup('env', 'CONTROLLER_VERIFY_SSL')) | default('false') }}"
    ansible_no_log: false
    import_path: "{{ playbook_dir }}/config_as_code"

  tasks:
    - name: Validate controller connection variables
      ansible.builtin.assert:
        that:
          - controller_hostname | length > 0
          - controller_username | length > 0
          - controller_password | length > 0
        fail_msg: "Required environment variables not set: CONTROLLER_HOST, CONTROLLER_USERNAME, CONTROLLER_PASSWORD"

    - name: "Setup authentication (block)"
      when: controller_oauthtoken is not defined
      block:
        - name: "Get the Authentication Token for the future requests"
          ansible.builtin.uri:
            url: "https://{{ controller_hostname }}/api/gateway/v1/tokens/"
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            method: POST
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            status_code: 201
          register: authtoken_res

        - name: "Set the oauth token to be used since now"
          ansible.builtin.set_fact:
            controller_oauthtoken: "{{ authtoken_res.json.token }}"
            aap_token: "{{ authtoken_res.json.token }}"
            controller_oauthtoken_url: "{{ authtoken_res.json.url }}"

    - name: Read configuration variables from the config_as_code filetree
      ansible.builtin.include_role:
        name: infra.aap_configuration_extended.filetree_read
      vars:
        any_errors_fatal: true
        orgs: ""
        dir_orgs_vars: "{{ import_path }}"
        # Controller Directory Paths
        filetree_controller_templates: "{{ import_path }}"
        filetree_controller_workflow_job_templates: "{{ import_path }}"
        # Logging
        controller_configuration_filetree_read_secure_logging: false
        controller_configuration_secure_logging: false
        aap_configuration_collect_logs: true

    - name: Dispatch the configuration to AAP
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        controller_configuration_filetree_create_secure_logging: false
        controller_configuration_filetree_read_secure_logging: false
        aap_configuration_secure_logging: false
        aap_configuration_collect_logs: true
        cas_secure_logging: false
        controller_configuration_job_templates_secure_logging: false

    - name: "Delete the Authentication Token used"
      ansible.builtin.uri:
        url: "https://{{ controller_hostname }}{{ controller_oauthtoken_url }}"
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        method: DELETE
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        status_code: 204
      when: controller_oauthtoken_url is defined

    - name: Display setup summary
      ansible.builtin.debug:
        msg:
          - "=== INCIDENT ENRICHMENT WORKFLOW SETUP COMPLETE ==="
          - ""
          - "Job Templates Created:"
          - "  1. Incident Enrichment"
          - "     - Playbook: incident_enrichment_examples/incident_enrichment.yml"
          - "     - Variables: issue (cpu|memory|storage), _hosts"
          - ""
          - "  2. ServiceNow Incident Update"
          - "     - Playbook: incident_enrichment_examples/servicenow_incident_update.yml"
          - "     - Variables: incident_number, alert_data (from workflow)"
          - ""
          - "Workflow Job Template Created:"
          - "  - Incident Enrichment Workflow"
          - "    - Node 1: Incident Enrichment"
          - "    - Node 2 (on success): ServiceNow Incident Update"
          - ""
          - "Usage:"
          - "  Launch 'Incident Enrichment Workflow' with:"
          - "    - issue: cpu|memory|storage"
          - "    - _hosts: target host pattern"
          - "    - incident_number: ServiceNow incident (e.g., INC0010001)"
          - ""
          - "Example:"
          - "  issue: memory"
          - "  _hosts: wintest1"
          - "  incident_number: INC0010001"
