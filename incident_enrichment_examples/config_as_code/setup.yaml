---
controller_templates:
  - name: "Incident Enrichment (CPU, Memory, Disk)"
    organization: "Default"
    project: "Ansible Examples"
    inventory: "Demo Inventory"
    playbook: "incident_enrichment_examples/incident_enrichment.yml"
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 0
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - "Demo Credential"
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: true
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    host_config_key: ""
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - max: 1024
          min: 0
          type: text
          required: False
          variable: _hosts
          new_question: False
          question_name: "{%- raw -%}What host do you want to obtain data for?{%- endraw -%}"
          question_description: "{%- raw -%}Required for launching manually{%- endraw -%}"
        - max: 1024
          min: 0
          type: multiplechoice
          choices:
            - "{%- raw -%}memory{%- endraw -%}"
            - "{%- raw -%}cpu{%- endraw -%}"
            - "{%- raw -%}storage{%- endraw -%}"
          required: False
          variable: issue
          new_question: False
          question_name: "{%- raw -%}What type of event is this?{%- endraw -%}"
          question_description: "{%- raw -%}Required for launching manually{%- endraw -%}"
      description: ""
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false


  - name: "SERVICENOW / Incident Enrichment"
    organization: "Default"
    project: "Ansible Examples"
    inventory: "Demo Inventory"
    playbook: "incident_enrichment_examples/servicenow_incident_update.yml"
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 0
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - "ServiceNow_Credential"
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: true
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: "Service Validation EE"
    host_config_key: ""
    survey_enabled: false
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false


controller_workflows:
  - name: Incident Enrichment Workflow
    organization: 'Default'
    simplified_workflow_nodes:
      - identifier: Update ServiceNow
        workflow_job_template: Incident Enrichment Workflow
        unified_job_template: SERVICENOW / Incident Enrichment
        limit: ""
        organization: 'Default'
        all_parents_must_converge: "False"
      - identifier: Incident Enrichment
        workflow_job_template: Incident Enrichment Workflow
        unified_job_template: Incident Enrichment (CPU, Memory, Disk)
        limit: ""
        organization: 'Default'
        all_parents_must_converge: "False"
        always_nodes:
          - Update ServiceNow
    ask_variables_on_launch: "True"
    allow_simultaneous: "False"
    scm_branch: ""
    limit: ""
    ask_limit_on_launch: false
    ask_inventory_on_launch: false
    webhook_service: ""
    extra_vars: ""
    survey_enabled: false

...
