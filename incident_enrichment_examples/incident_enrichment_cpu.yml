---
# CPU Investigation Report - OS-agnostic wrapper using incident_enrichment_cpu role
# Use case: Alert system detects high CPU and triggers this playbook via AAP webhook
# Works on both Windows and Linux systems by detecting OS and running appropriate tasks

- name: CPU Investigation Report
  hosts: "{{ _hosts | default('all') }}"
  gather_facts: true

  roles:
    - roles/incident_enrichment_cpu
