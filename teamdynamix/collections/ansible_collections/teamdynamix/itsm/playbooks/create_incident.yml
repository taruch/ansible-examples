---
# teamdynamix.itsm — Create a TeamDynamix Incident Ticket
#
# Run via collection:
#   ansible-playbook teamdynamix.itsm.create_incident \
#     -e tdx_instance=myorg -e tdx_app_id=35 \
#     -e tdx_beid=<BEID> -e tdx_wskey=<WS_KEY> \
#     -e ticket_type_id=111 -e ticket_account_id=222 \
#     -e ticket_status_id=333 -e ticket_priority_id=444
#
# Required variables:
#   tdx_instance       TDX subdomain (e.g. "myorg")
#   tdx_app_id         Ticketing application ID
#   tdx_beid           Service account BEID
#   tdx_wskey          Service account Web Services Key
#   ticket_type_id     TypeID for "Incident" ticket type
#   ticket_account_id  AccountID (department owning the ticket)
#   ticket_status_id   StatusID for "New"
#   ticket_priority_id PriorityID (e.g. High, Medium)
#
# Optional:
#   ticket_title           Incident summary (default provided below)
#   ticket_description     Full incident description
#   ticket_requestor_uid   Requestor UID (GUID); omit to use service account

- name: Create a TeamDynamix Incident Ticket
  hosts: localhost
  gather_facts: false
  vars:
    tdx_base_url: "https://{{ tdx_instance }}.teamdynamix.com/TDWebApi/api"
    ticket_title: "Incident - Service Disruption"
    ticket_description: "Users are reporting inability to access the service. Immediate investigation required."
    ticket_requestor_uid: ""

  tasks:
    - name: Authenticate with TeamDynamix (service account)
      ansible.builtin.uri:
        url: "{{ tdx_base_url }}/auth/loginadmin"
        method: POST
        body_format: json
        body:
          BEID: "{{ tdx_beid }}"
          WebServicesKey: "{{ tdx_wskey }}"
        status_code: 200
        return_content: true
      register: tdx_auth
      no_log: true

    - name: Create incident ticket
      ansible.builtin.uri:
        url: "{{ tdx_base_url }}/{{ tdx_app_id }}/tickets?notifyRequestor=true"
        method: POST
        headers:
          Authorization: "Bearer {{ tdx_auth.json }}"
        body_format: json
        body:
          TypeID: "{{ ticket_type_id | int }}"
          Title: "{{ ticket_title }}"
          Description: "{{ ticket_description }}"
          AccountID: "{{ ticket_account_id | int }}"
          StatusID: "{{ ticket_status_id | int }}"
          PriorityID: "{{ ticket_priority_id | int }}"
          RequestorUID: "{{ ticket_requestor_uid | default(omit) }}"
        status_code: 201
      register: new_ticket

    - name: Display created ticket details
      ansible.builtin.debug:
        msg:
          - "Ticket ID  : {{ new_ticket.json.ID }}"
          - "Title      : {{ new_ticket.json.Title }}"
          - "Status     : {{ new_ticket.json.StatusName }}"
          - "Priority   : {{ new_ticket.json.PriorityName }}"
          - "URL        : https://{{ tdx_instance }}.teamdynamix.com/TDNext/Apps/{{ tdx_app_id }}/Tickets/TicketDet?TicketID={{ new_ticket.json.ID }}"

    - name: Expose ticket ID as a fact for downstream use
      ansible.builtin.set_fact:
        tdx_ticket_id: "{{ new_ticket.json.ID }}"
...
