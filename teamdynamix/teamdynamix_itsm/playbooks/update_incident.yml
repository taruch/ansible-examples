---
# teamdynamix.itsm — Update an existing TeamDynamix incident ticket.
#
# Demonstrates teamdynamix.itsm.incident_info (read) + .incident (update).
# Auth comes from env vars (TDX_HOST, TDX_APP_ID, and either
# TDX_USERNAME+TDX_PASSWORD or TDX_TOKEN) or extra vars.

- name: Update a TeamDynamix incident ticket
  hosts: localhost
  gather_facts: false
  vars:
    instance:
      host: "{{ tdx_instance | default(omit) }}"
      app_id: "{{ tdx_app_id | default(omit) }}"
      username: "{{ tdx_username | default(omit) }}"
      password: "{{ tdx_password | default(omit) }}"
      token: "{{ tdx_token | default(omit) }}"
  tasks:
    - name: Read current ticket state
      teamdynamix.itsm.incident_info:
        instance: "{{ instance }}"
        id: "{{ tdx_ticket_id | int }}"
      register: current

    - name: Display current state
      ansible.builtin.debug:
        msg:
          - "Title    : {{ current.records[0].title }}"
          - "Status   : {{ current.records[0].status_name }}"
          - "Priority : {{ current.records[0].priority_name }}"

    - name: Apply field updates (no-op if already at target values)
      teamdynamix.itsm.incident:
        instance: "{{ instance }}"
        id: "{{ tdx_ticket_id }}"
        status_id: "{{ update_status_id }}"
        priority_id: "{{ update_priority_id | default(omit) }}"
      when: update_status_id is defined
      register: updated

    - name: Display updated state
      ansible.builtin.debug:
        msg:
          - "Status   : {{ updated.record.status_name | default(current.records[0].status_name) }}"
          - "Priority : {{ updated.record.priority_name | default(current.records[0].priority_name) }}"
      when: updated is defined and updated.changed
