---
# teamdynamix.itsm — Create a TeamDynamix Incident Ticket
#
# Demonstrates the teamdynamix.itsm.incident module. Auth comes from env vars
# (TDX_HOST, TDX_APP_ID, and either TDX_USERNAME+TDX_PASSWORD or TDX_TOKEN)
# or extra vars.
#
# Run via collection:
#   ansible-playbook teamdynamix.itsm.create_incident \
#     -e ticket_type_id=111 -e ticket_account_id=222 \
#     -e ticket_status_id=333 -e ticket_priority_id=444

- name: Create a TeamDynamix incident ticket
  hosts: localhost
  gather_facts: false
  vars:
    ticket_title: "Incident - Service Disruption"
    ticket_description: "Users are reporting inability to access the service. Immediate investigation required."
  tasks:
    - name: Create incident
      teamdynamix.itsm.incident:
        instance:
          host: "{{ tdx_instance | default(omit) }}"
          app_id: "{{ tdx_app_id | default(omit) }}"
          username: "{{ tdx_username | default(omit) }}"
          password: "{{ tdx_password | default(omit) }}"
          token: "{{ tdx_token | default(omit) }}"
        state: present
        title: "{{ ticket_title }}"
        description: "{{ ticket_description }}"
        type_id: "{{ ticket_type_id | int }}"
        account_id: "{{ ticket_account_id | int }}"
        status_id: "{{ ticket_status_id | int }}"
        priority_id: "{{ ticket_priority_id | int }}"
      register: created

    - name: Display created ticket
      ansible.builtin.debug:
        msg:
          - "Ticket ID : {{ created.record.id }}"
          - "Title     : {{ created.record.title }}"
          - "Status    : {{ created.record.status_name }}"
          - "Priority  : {{ created.record.priority_name }}"

    - name: Expose ticket ID for downstream tasks
      ansible.builtin.set_fact:
        tdx_ticket_id: "{{ created.record.id }}"
