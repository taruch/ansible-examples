---
- hosts: localhost
  connection: local
  gather_facts: false

  vars:
    azure_tenant: "example-corp.onmicrosoft.com"
    azure_subscription_id: "12345678-abcd-ef12-3456-7890abcdef12"
    azure_client_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    azure_secret: "{{ vault_azure_secret }}"   # store in Ansible Vault or AAP credential
    azure_resource_group: "example-resource-group"
    key_vault_name: "my-ansible-keyvault"
    secret_name: adminPassword
    secret_value: "{{ vault_admin_password }}" # store in Ansible Vault or AAP credential

  tasks:

    - name: Get Azure Key Vault details
      environment:
        AZURE_CLIENT_ID: "{{ azure_client_id }}"
        AZURE_SECRET: "{{ azure_secret }}"
        AZURE_TENANT: "{{ azure_tenant }}"
        AZURE_SUBSCRIPTION_ID: "{{ azure_subscription_id }}"
      azure.azcollection.azure_rm_keyvault_info:
        resource_group: "{{ azure_resource_group }}"
        name: "{{ key_vault_name }}"
      register: keyvault

    - name: Debug KeyVault details
      ansible.builtin.debug:
        msg: "KeyVault details: {{ keyvault }}"
        verbosity: 2

    - name: Set KeyVault uri fact
      ansible.builtin.set_fact:
        keyvaulturi: "{{ keyvault['keyvaults'][0]['vault_uri'] }}"

    - name: Debug KeyVault URI details
      ansible.builtin.debug:
        msg: "KeyVault URI: {{ keyvaulturi }}"
        verbosity: 2

    - name: Create a secret
      environment:
        AZURE_CLIENT_ID: "{{ azure_client_id }}"
        AZURE_SECRET: "{{ azure_secret }}"
        AZURE_TENANT: "{{ azure_tenant }}"
        AZURE_SUBSCRIPTION_ID: "{{ azure_subscription_id }}"
      azure.azcollection.azure_rm_keyvaultsecret:
        secret_name: "{{ secret_name }}"
        secret_value: "{{ secret_value }}"
        keyvault_uri: "{{ keyvaulturi }}"
